<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Tag — CyberUniverso</title>
<meta name="description" id="metaDesc" content="Palavras relacionadas no CyberUniverso.">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--azul:#1a6ef5;--azul-escuro:#0d3fa6;--amarelo:#f5e800;--ciano:#00eaff;--fundo:#05080f;--card:#0a1628;--card2:#0d1f3c;--borda:#1a3a6e;--texto:#d0e4ff;}
  body{font-family:'Nunito',sans-serif;background:var(--fundo);color:var(--texto);overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}

  .page-wrap{max-width:900px;margin:0 auto;padding:90px 16px 60px;}

  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#4a6fa5;margin-bottom:24px;flex-wrap:wrap;}
  .breadcrumb a{color:#4a6fa5;text-decoration:none;}
  .breadcrumb a:hover{color:var(--ciano);}

  .page-hero{text-align:center;padding:40px 0 36px;position:relative;}
  .page-hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--azul),transparent);}
  .tag-label{font-size:13px;font-weight:800;color:#4a6fa5;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .page-titulo{font-family:'Bangers',cursive;font-size:clamp(42px,10vw,72px);letter-spacing:4px;color:var(--amarelo);text-shadow:3px 3px 0 var(--azul),6px 6px 0 var(--azul-escuro);-webkit-text-stroke:1.5px var(--azul);animation:titlePop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;}
  @keyframes titlePop{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .page-sub{font-size:15px;color:#4a6fa5;margin-top:10px;font-weight:700;}

  .secao-titulo{font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;color:var(--ciano);margin:32px 0 16px;display:flex;align-items:center;gap:10px;}
  .secao-titulo::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--borda),transparent);}

  .contador{font-size:13px;color:#4a6fa5;font-weight:700;margin-bottom:16px;}
  .contador span{color:var(--ciano);}

  .palavras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:8px;}
  .palavra-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--borda);border-radius:10px;padding:10px 14px;text-decoration:none;transition:all 0.2s;position:relative;overflow:hidden;}
  .palavra-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--azul);transform:scaleY(0);transition:transform 0.2s;transform-origin:bottom;}
  .palavra-item:hover{border-color:var(--azul);transform:translateY(-2px);}
  .palavra-item:hover::before{transform:scaleY(1);}
  .palavra-item:hover .palavra-nome{color:var(--amarelo);}
  .palavra-nome{font-size:15px;font-weight:800;color:var(--texto);transition:color 0.2s;}
  .palavra-detalhe{font-size:11px;color:#4a6fa5;font-weight:700;margin-top:2px;}
  .palavra-seta{font-size:12px;color:#2a4a7a;transition:color 0.2s;flex-shrink:0;}
  .palavra-item:hover .palavra-seta{color:var(--ciano);}

  /* skeleton */
  .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:32px;}
  .skeleton-item{height:52px;background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  .sem-resultado{text-align:center;padding:60px 20px;}
  .sem-emoji{font-size:48px;margin-bottom:12px;}
  .sem-texto{font-family:'Fredoka One',cursive;font-size:20px;color:#4a6fa5;margin-bottom:16px;}
  .sem-link{display:inline-block;margin-top:8px;color:var(--ciano);font-weight:800;font-size:15px;text-decoration:none;}
  .sem-link:hover{color:var(--amarelo);}

  .badge-fonte{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
  .badge-tag{background:rgba(0,234,255,0.1);border:1px solid rgba(0,234,255,0.3);color:var(--ciano);}
  .badge-sin{background:rgba(26,110,245,0.15);border:1px solid rgba(26,110,245,0.3);color:#7ab0ff;}

  @media(max-width:600px){.palavras-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}}
</style>
</head>
<body>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">Início</a>
    <span style="color:#2a4a7a"> › </span>
    <span id="breadTermo" style="color:var(--ciano)">...</span>
  </div>

  <div class="page-hero">
    <div class="tag-label">🔖 palavras associadas a</div>
    <h1 class="page-titulo" id="heroTitulo">...</h1>
    <p class="page-sub" id="heroSub">Carregando...</p>
  </div>

  <div id="conteudo">
    <div class="skeleton-grid">
      ${Array(8).fill('<div class="skeleton-item"></div>').join('')}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>
<script>
const sb = window._supabase
const params = new URLSearchParams(window.location.search)
const termo = params.get('t') || ''

async function init() {
  if (!termo) {
    document.getElementById('conteudo').innerHTML = '<div class="sem-resultado"><div class="sem-emoji">🤔</div><div class="sem-texto">Nenhuma tag especificada.</div><a href="todas.html" class="sem-link">← Ver todas as palavras</a></div>'
    return
  }

  // Atualizar título e meta
  document.getElementById('pageTitle').textContent = '#' + termo + ' — CyberUniverso'
  document.getElementById('metaDesc').setAttribute('content', 'Palavras com a tag ou sinônimo "' + termo + '" no CyberUniverso.')
  document.getElementById('breadTermo').textContent = '#' + termo
  document.getElementById('heroTitulo').textContent = '#' + termo.toUpperCase()

  // Buscar em paralelo: palavras com essa tag E palavras com esse sinônimo
  const termoLower = termo.toLowerCase()

  const [
    { data: tagIds },
    { data: sinonimosResult }
  ] = await Promise.all([
    sb.from('tags').select('id').ilike('nome', termoLower),
    sb.from('sinonimos').select('palavra_id, sinonimo').ilike('sinonimo', termo)
  ])

  // IDs de palavras via tag
  let palavraIdsPorTag = []
  if (tagIds && tagIds.length > 0) {
    const { data: pt } = await sb.from('palavras_tags')
      .select('palavra_id')
      .in('tag_id', tagIds.map(t => t.id))
    palavraIdsPorTag = (pt || []).map(r => r.palavra_id)
  }

  // IDs de palavras via sinônimo
  const palavraIdsPorSin = (sinonimosResult || []).map(r => r.palavra_id)
  const sinonimoPorPalavra = {}
  ;(sinonimosResult || []).forEach(r => { sinonimoPorPalavra[r.palavra_id] = r.sinonimo })

  // Unir IDs sem repetir
  const todosIds = [...new Set([...palavraIdsPorTag, ...palavraIdsPorSin])]

  if (todosIds.length === 0) {
    document.getElementById('heroSub').textContent = 'Nenhuma palavra encontrada com essa associação'
    document.getElementById('conteudo').innerHTML = `
      <div class="sem-resultado">
        <div class="sem-emoji">🔍</div>
        <div class="sem-texto">Nenhuma palavra encontrada para "<strong>${termo}</strong>"</div>
        <a href="todas.html" class="sem-link">← Ver todas as palavras</a>
      </div>`
    return
  }

  // Buscar palavras aprovadas com esses IDs
  const { data: palavras } = await sb.from('palavras')
    .select('id, termo, slug')
    .eq('status', 'aprovada')
    .in('id', todosIds)
    .order('termo', { ascending: true })

  const lista = palavras || []
  const total = lista.length

  document.getElementById('heroSub').textContent =
    total + ' palavra' + (total !== 1 ? 's' : '') + ' encontrada' + (total !== 1 ? 's' : '')

  if (total === 0) {
    document.getElementById('conteudo').innerHTML = `
      <div class="sem-resultado">
        <div class="sem-emoji">🔍</div>
        <div class="sem-texto">Nenhuma palavra aprovada encontrada para "<strong>${termo}</strong>"</div>
        <a href="todas.html" class="sem-link">← Ver todas as palavras</a>
      </div>`
    return
  }

  // Separar por fonte para exibir badge
  const porTag = lista.filter(p => palavraIdsPorTag.includes(p.id))
  const porSin = lista.filter(p => palavraIdsPorSin.includes(p.id) && !palavraIdsPorTag.includes(p.id))

  let html = ''

  if (porTag.length > 0) {
    html += `<div class="secao-titulo">🔖 Com a tag <span style="color:var(--amarelo);margin-left:6px">#${termo}</span></div>`
    html += `<div class="contador">Mostrando <span>${porTag.length}</span> palavra${porTag.length !== 1 ? 's' : ''}</div>`
    html += '<div class="palavras-grid">'
    porTag.forEach(p => {
      html += `<a href="palavra.html?w=${p.slug}" class="palavra-item">
        <div><span class="palavra-nome">${p.termo}</span></div>
        <span class="palavra-seta">→</span>
      </a>`
    })
    html += '</div>'
  }

  if (porSin.length > 0) {
    html += `<div class="secao-titulo">🔄 Com o sinônimo <span style="color:var(--amarelo);margin-left:6px">${termo}</span></div>`
    html += `<div class="contador">Mostrando <span>${porSin.length}</span> palavra${porSin.length !== 1 ? 's' : ''}</div>`
    html += '<div class="palavras-grid">'
    porSin.forEach(p => {
      html += `<a href="palavra.html?w=${p.slug}" class="palavra-item">
        <div>
          <span class="palavra-nome">${p.termo}</span>
          <div class="palavra-detalhe">sin: ${sinonimoPorPalavra[p.id] || termo}</div>
        </div>
        <span class="palavra-seta">→</span>
      </a>`
    })
    html += '</div>'
  }

  document.getElementById('conteudo').innerHTML = html
}

init()
</script>
<script src="./header.js"></script>
</body>
</html>
