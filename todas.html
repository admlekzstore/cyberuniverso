<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todas as Palavras — CyberUniverso</title>
<meta name="description" content="Todas as gírias, expressões e palavras do CyberUniverso em ordem alfabética.">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --azul:#1a6ef5;--azul-escuro:#0d3fa6;--amarelo:#f5e800;
    --ciano:#00eaff;--fundo:#05080f;--card:#0a1628;--card2:#0d1f3c;
    --borda:#1a3a6e;--texto:#d0e4ff;
  }
  body{font-family:'Nunito',sans-serif;background:var(--fundo);color:var(--texto);overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}






  .nav-links a.ativo{color:var(--amarelo);}










  .page-wrap{max-width:900px;margin:0 auto;padding:90px 16px 60px;}

  .page-hero{text-align:center;padding:40px 0 36px;position:relative;}
  .page-hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--azul),transparent);}
  .page-titulo{font-family:'Bangers',cursive;font-size:clamp(42px,10vw,72px);letter-spacing:4px;color:var(--amarelo);text-shadow:3px 3px 0 var(--azul),6px 6px 0 var(--azul-escuro);-webkit-text-stroke:1.5px var(--azul);animation:titlePop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;}
  @keyframes titlePop{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .page-sub{font-size:15px;color:#4a6fa5;margin-top:8px;font-weight:700;}

  .busca-wrap{margin:28px 0 24px;}
  .busca-row{display:flex;background:var(--card);border:1.5px solid var(--borda);border-radius:12px;overflow:hidden;transition:border-color 0.2s;}
  .busca-row:focus-within{border-color:var(--azul);}
  .busca-row input{flex:1;background:none;border:none;outline:none;padding:14px 18px;color:var(--texto);font-family:'Nunito',sans-serif;font-size:15px;}
  .busca-row input::placeholder{color:#2a4a7a;}
  .busca-row button{background:var(--azul);border:none;padding:0 20px;color:#fff;font-size:18px;cursor:pointer;transition:background 0.2s;}
  .busca-row button:hover{background:#0050cc;}

  .alfa-sticky{position:sticky;top:60px;z-index:50;background:rgba(5,8,15,0.95);backdrop-filter:blur(10px);padding:12px 0;border-bottom:1px solid var(--borda);margin-bottom:28px;}
  .alfa-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
  .alfa-btn{background:var(--card2);border:1px solid var(--borda);color:var(--texto);width:36px;height:36px;border-radius:8px;font-family:'Bangers',cursive;font-size:18px;cursor:pointer;transition:all 0.15s;text-decoration:none;display:flex;align-items:center;justify-content:center;}
  .alfa-btn:hover,.alfa-btn.ativo{background:var(--azul);color:#fff;border-color:var(--azul);}
  .alfa-btn.vazio{opacity:0.25;cursor:default;}
  .alfa-btn.vazio:hover{background:var(--card2);color:var(--texto);border-color:var(--borda);}

  .contador{text-align:center;font-size:13px;color:#4a6fa5;font-weight:700;margin-bottom:20px;}
  .contador span{color:var(--ciano);}

  .letra-grupo{margin-bottom:32px;animation:fadeUp 0.4s both;}
  @keyframes fadeUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .letra-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .letra-badge{font-family:'Bangers',cursive;font-size:42px;color:var(--amarelo);text-shadow:2px 2px 0 var(--azul);line-height:1;-webkit-text-stroke:1px var(--azul);}
  .letra-linha{flex:1;height:1px;background:linear-gradient(90deg,var(--borda),transparent);}
  .letra-count{font-size:12px;color:#4a6fa5;font-weight:700;}

  .palavras-grid{display:flex;flex-direction:column;gap:6px;}
  .palavra-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--borda);border-radius:10px;padding:12px 18px;text-decoration:none;transition:all 0.2s;position:relative;overflow:hidden;}
  .palavra-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--azul);transform:scaleY(0);transition:transform 0.2s;transform-origin:bottom;}
  .palavra-item:hover{border-color:var(--azul);transform:translateX(4px);}
  .palavra-item:hover::before{transform:scaleY(1);}
  .palavra-item:hover .palavra-nome{color:var(--amarelo);}
  .palavra-nome{font-size:15px;font-weight:800;color:var(--texto);transition:color 0.2s;}
  .palavra-seta{font-size:12px;color:#2a4a7a;transition:color 0.2s;}
  .palavra-item:hover .palavra-seta{color:var(--ciano);}

  /* skeleton */
  .skeleton-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:32px;}
  .skeleton-item{height:46px;background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  .sem-resultado{text-align:center;padding:60px 20px;display:none;}
  .sem-resultado.visivel{display:block;}
  .sem-emoji{font-size:48px;margin-bottom:12px;}
  .sem-texto{font-family:'Fredoka One',cursive;font-size:20px;color:#4a6fa5;}

  /* loading inicial */
  .loading-msg{text-align:center;padding:40px;color:#4a6fa5;font-size:15px;font-weight:700;}


</style>
</head>
<body>

<div class="page-wrap">

  <div class="page-hero">
    <h1 class="page-titulo">📖 TODAS AS PALAVRAS</h1>
    <p class="page-sub">Explore o dicionário completo em ordem alfabética</p>
  </div>

  <div class="busca-wrap">
    <div class="busca-row">
      <input type="text" id="buscaInput" placeholder="Filtrar palavras..." oninput="filtrar()">
      <button onclick="filtrar()">🔍</button>
    </div>
  </div>

  <div class="alfa-sticky">
    <div class="alfa-grid" id="alfaGrid"></div>
  </div>

  <div class="contador">Mostrando <span id="contadorNum">0</span> palavras</div>

  <div id="listagem">
    <!-- skeleton enquanto carrega -->
    <div class="skeleton-grid">
      ${Array(12).fill('<div class="skeleton-item"></div>').join('')}
    </div>
  </div>

  <div class="sem-resultado" id="semResultado">
    <div class="sem-emoji">🤔</div>
    <div class="sem-texto">Nenhuma palavra encontrada...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>
<script>
  const sb = window._supabase
  let todasPalavras = []
  let filtrado = []

  // ── CARREGAR DO SUPABASE ──
  async function carregarPalavras() {
    const { data, error } = await sb
      .from('palavras')
      .select('termo, slug')
      .eq('status', 'aprovada')
      .order('termo', { ascending: true })

    if (error || !data) {
      document.getElementById('listagem').innerHTML =
        '<div class="loading-msg">Erro ao carregar palavras. Tente recarregar a página.</div>'
      return
    }

    todasPalavras = data.map(p => ({ palavra: p.termo, slug: p.slug }))
    filtrado = [...todasPalavras]

    // verificar se veio busca pela URL (ex: vindo do index.html)
    const params = new URLSearchParams(window.location.search)
    const buscaURL = params.get('busca')
    const letraURL = params.get('letra')

    if (buscaURL) {
      document.getElementById('buscaInput').value = buscaURL
      filtrado = todasPalavras.filter(p => p.palavra.toLowerCase().includes(buscaURL.toLowerCase()))
    } else if (letraURL) {
      filtrado = todasPalavras.filter(p => p.palavra[0].toUpperCase() === letraURL.toUpperCase())
    }

    renderizar(filtrado)
    renderAlfa(letraURL ? letraURL.toUpperCase() : null)

    // scroll para a letra se veio da URL
    if (letraURL) {
      setTimeout(() => {
        const el = document.getElementById('grupo-' + letraURL.toUpperCase())
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' })
      }, 300)
    }
  }

  // ── RENDERIZAR LISTA ──
  function renderizar(lista) {
    const listagem = document.getElementById('listagem')
    const sem = document.getElementById('semResultado')
    document.getElementById('contadorNum').textContent = lista.length

    if (lista.length === 0) {
      listagem.innerHTML = ''
      sem.classList.add('visivel')
      return
    }
    sem.classList.remove('visivel')

    const grupos = agruparPorLetra(lista)
    const letras = Object.keys(grupos).sort()

    listagem.innerHTML = letras.map((l, i) => `
      <div class="letra-grupo" style="animation-delay:${i * 0.04}s" id="grupo-${l}">
        <div class="letra-header">
          <div class="letra-badge">${l}</div>
          <div class="letra-linha"></div>
          <div class="letra-count">${grupos[l].length} palavra${grupos[l].length > 1 ? 's' : ''}</div>
        </div>
        <div class="palavras-grid">
          ${grupos[l].map(p => `
            <a href="palavra.html?w=${p.slug}" class="palavra-item">
              <span class="palavra-nome">${p.palavra}</span>
              <span class="palavra-seta">→</span>
            </a>
          `).join('')}
        </div>
      </div>
    `).join('')
  }

  // ── AGRUPAR POR LETRA ──
  function agruparPorLetra(lista) {
    const grupos = {}
    lista.forEach(p => {
      const l = p.palavra[0].toUpperCase()
      if (!grupos[l]) grupos[l] = []
      grupos[l].push(p)
    })
    return grupos
  }

  // ── FILTRAR ──
  function filtrar() {
    const q = document.getElementById('buscaInput').value.toLowerCase().trim()
    filtrado = q
      ? todasPalavras.filter(p => p.palavra.toLowerCase().includes(q))
      : [...todasPalavras]
    renderizar(filtrado)
    renderAlfa()
  }  

  // ── ALFABETO ──
  function renderAlfa(letraAtiva) {
    const grid = document.getElementById('alfaGrid')
    // sempre usa todasPalavras pra saber quais letras existem no banco
    const letrasComPalavras = new Set(todasPalavras.map(p => p.palavra[0].toUpperCase()))
    const todasLetras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')
    grid.innerHTML = todasLetras.map(l => {
      const temPalavra = letrasComPalavras.has(l)
      const ativo = letraAtiva && letraAtiva === l ? ' ativo' : ''
      return `<a href="#grupo-${l}" class="alfa-btn${ativo}${temPalavra ? '' : ' vazio'}"
        onclick="irPara('${l}', event)">${l}</a>`
    }).join('')
  }

  function irPara(letra, e) {
    e.preventDefault()
    // se estiver filtrado por letra, mostra todas e vai pra letra
    const q = document.getElementById('buscaInput').value.trim()
    if (!q) {
      filtrado = [...todasPalavras]
      renderizar(filtrado)
      renderAlfa()
    }
    setTimeout(() => {
      const el = document.getElementById('grupo-' + letra)
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }, 50)
  }

  // ── INIT ──
  renderAlfa()
  carregarPalavras()
</script>
<script src="./header.js"></script>
</body>
</html>
