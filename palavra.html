<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--azul:#1a6ef5;--azul-escuro:#0d3fa6;--amarelo:#f5e800;--ciano:#00eaff;--fundo:#05080f;--card:#0a1628;--card2:#0d1f3c;--borda:#1a3a6e;--texto:#d0e4ff;}

  .page-wrap{max-width:1100px;margin:0 auto;padding:90px 16px 60px;display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start;}
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#4a6fa5;margin-bottom:20px;flex-wrap:wrap;}

  .palavra-titulo{font-family:'Bangers',cursive;font-size:clamp(28px,12vw,100px);line-height:1.05;letter-spacing:3px;color:var(--amarelo);text-shadow:4px 4px 0 var(--azul),8px 8px 0 var(--azul-escuro);-webkit-text-stroke:2px var(--azul);animation:titlePop 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both;margin-bottom:16px;word-break:break-word;}
  .palavra-titulo.curta{font-size:clamp(60px,15vw,100px);}
  .palavra-titulo.media{font-size:clamp(40px,10vw,72px);}
  .palavra-titulo.longa{font-size:clamp(28px,7vw,52px);}
  .palavra-titulo.muito-longa{font-size:clamp(22px,5vw,38px);letter-spacing:1px;}
  @keyframes titlePop{from{transform:scale(0.6) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
  @keyframes fadeUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .pronuncia{font-size:14px;color:#4a8aff;font-weight:700;letter-spacing:2px;margin-bottom:16px;}
  .pronuncia span{background:rgba(26,110,245,0.15);border:1px solid rgba(26,110,245,0.3);border-radius:20px;padding:4px 14px;font-family:'Fredoka One',cursive;font-size:16px;}

  .categorias{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}

  .tags-list{display:flex;flex-wrap:wrap;gap:8px;}

  .btn-novo-sig{display:flex;align-items:center;gap:8px;background:rgba(163,255,74,0.08);border:1.5px dashed rgba(163,255,74,0.35);color:#a3ff4a;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;width:100%;justify-content:center;margin-top:4px;text-decoration:none;}
  .btn-novo-sig:hover{background:rgba(163,255,74,0.15);}
  .alfa-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .alfa-grupo{display:flex;flex-direction:column;gap:4px;flex:1;}
  .alfa-grupo.direita{text-align:right;align-items:flex-end;}
  .alfa-label{font-size:11px;color:#4a6fa5;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .alfa-link{color:var(--ciano);text-decoration:none;font-size:16px;font-weight:800;transition:color 0.2s;}
  .alfa-link:hover{color:var(--amarelo);}
  .alfa-sep{color:var(--borda);font-size:24px;}
  .share-btns{display:flex;gap:10px;flex-wrap:wrap;}
  .share-btn{display:flex;align-items:center;gap:8px;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:all 0.2s;text-decoration:none;}
  .share-btn:hover{transform:translateY(-2px);}
  .share-wpp{background:#25d366;color:#fff;}
  .share-copy{background:var(--card2);border:1px solid var(--borda);color:var(--texto);}
  .share-twitter{background:#1da1f2;color:#fff;}
  .comentario{display:flex;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--borda);}
  .com-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#f5e800,#f5a800);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#000;}
  .com-meta{font-size:12px;color:#4a6fa5;margin-bottom:4px;}
  .com-meta strong{color:var(--ciano);}
  .com-text{font-size:14px;color:var(--texto);line-height:1.5;}
  .comment-form{margin-top:16px;}
  .comment-form textarea{width:100%;background:var(--card2);border:1.5px solid var(--borda);border-radius:10px;padding:12px 16px;color:var(--texto);font-family:'Nunito',sans-serif;font-size:14px;resize:vertical;min-height:90px;outline:none;}
  .comment-form textarea:focus{border-color:var(--azul);}
  .comment-form textarea::placeholder{color:#2a4a7a;}
  .btn-comentar{margin-top:10px;background:var(--azul);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-family:'Bangers',cursive;font-size:18px;letter-spacing:1px;cursor:pointer;}
  .btn-comentar:hover{background:#0050cc;}
  .sidebar{position:sticky;top:90px;display:flex;flex-direction:column;gap:16px;}
  .sidebar-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:18px;position:relative;overflow:hidden;}
  .sidebar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--amarelo),transparent);}
  .sidebar-title{font-family:'Bangers',cursive;font-size:18px;letter-spacing:2px;color:var(--amarelo);margin-bottom:14px;}
  .top-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(26,58,110,0.5);text-decoration:none;}
  .top-item:last-child{border-bottom:none;}
  .top-item:hover .top-word{color:var(--amarelo);}
  .top-rank{font-family:'Bangers',cursive;font-size:18px;color:var(--azul);width:24px;text-align:center;}
  .top-rank.ouro{color:#ffd700;}.top-rank.prata{color:#c0c0c0;}.top-rank.bronze{color:#cd7f32;}
  .top-word{font-size:14px;font-weight:800;color:var(--texto);flex:1;}
  .recente-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(26,58,110,0.5);text-decoration:none;}
  .recente-item:last-child{border-bottom:none;}
  .recente-item:hover .recente-word{color:var(--ciano);}
  .recente-dot{width:6px;height:6px;border-radius:50%;background:var(--ciano);}
  .recente-word{font-size:14px;font-weight:800;color:var(--texto);flex:1;}
  .recente-data{font-size:11px;color:#4a6fa5;}
  .sidebar-search{display:flex;overflow:hidden;border-radius:8px;border:1.5px solid var(--borda);}
  .sidebar-search input{flex:1;background:var(--card2);border:none;outline:none;padding:10px 12px;color:var(--texto);font-family:'Nunito',sans-serif;font-size:14px;}
  .sidebar-search input::placeholder{color:#2a4a7a;}
  .sidebar-search button{background:var(--azul);border:none;padding:0 14px;color:#fff;font-size:16px;cursor:pointer;}
  .not-found{text-align:center;padding:80px 20px;}
  .not-found-emoji{font-size:64px;margin-bottom:16px;}
  .not-found-titulo{font-family:'Bangers',cursive;font-size:36px;color:#ff5050;letter-spacing:2px;margin-bottom:8px;}
  .not-found-sub{color:#4a6fa5;font-size:15px;}
  @media(max-width:768px){.page-wrap{grid-template-columns:1fr;}.sidebar{position:static;}.nav-links{display:none;}.menu-btn{display:flex;}}
</style>

<body>
<div class="page-wrap">
  <main id="mainCol"><p style="color:#4a6fa5;padding:40px;text-align:center;">Carregando...</p></main>
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">🔍 Buscar</div>
      <div class="sidebar-search">
        <input type="text" id="sidebarBusca" placeholder="Buscar palavra..." onkeydown="if(event.key==='Enter')buscarSidebar()">
        <button onclick="buscarSidebar()">→</button>
      </div>
    </div>
    <div class="sidebar-card" id="sidebarTop"><div class="sidebar-title">🏆 Top Palavras</div><p style="color:#4a6fa5;font-size:13px;">Carregando...</p></div>
    <div class="sidebar-card" id="sidebarRecentes"><div class="sidebar-title">🆕 Últimas Adicionadas</div><p style="color:#4a6fa5;font-size:13px;">Carregando...</p></div>
  </aside>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>
<script>
const sb = window._supabase
const params = new URLSearchParams(window.location.search)
const slug = params.get('w')
let palavraId = null
let userSession = null
let reacaoAtiva = null

// ID anônimo persistente para reações sem login
function getAnonId() {
  var id = localStorage.getItem('cyberuniverso_anon_id')
  if (!id) {
    id = 'anon_' + Math.random().toString(36).slice(2) + Date.now().toString(36)
    localStorage.setItem('cyberuniverso_anon_id', id)
  }
  return id
}

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  userSession = session
  if (session) { const el = document.getElementById('navEntrar'); if (el) el.textContent = 'Minha Conta' }
  if (!slug) { mostrarNotFound('Nenhuma palavra especificada.'); return }
  await Promise.all([carregarPalavra(), carregarSidebar()])
}

async function carregarPalavra() {
  const { data: p, error } = await sb
    .from('palavras')
    .select('id, termo, slug, pronuncia, imagem_url, nivel_uso, regiao, contexto, epoca, criado_em, categoria_id, status, usuario_id, enviado_por')
    .eq('slug', slug)
    .eq('status', 'aprovada')
    .single()

  if (error || !p) { mostrarNotFound('A palavra "' + slug + '" não foi encontrada.'); return }

  palavraId = p.id
  // Título do Google — usa personalizado se existir
  var tituloSEO = p.seo_titulo
    ? p.seo_titulo + ' — CyberDicionário'
    : 'O que é ' + p.termo + '? — CyberDicionário'
  document.getElementById('pageTitle').textContent = tituloSEO

  // Meta description
  var primeiroSig = ''
  // será preenchido após carregar significados — veja injetarSEO()

  // URL canônica
  var urlCanonica = 'https://cyberuniverso.com/palavra.html?w=' + encodeURIComponent(slug)
  var canonical = document.getElementById('canonicalUrl')
  if (canonical) canonical.setAttribute('href', urlCanonica)
  var ogUrl = document.getElementById('ogUrl')
  if (ogUrl) ogUrl.setAttribute('content', urlCanonica)

  // OG title
  var ogTitle = document.getElementById('ogTitle')
  if (ogTitle) ogTitle.setAttribute('content', p.seo_titulo || ('O que é ' + p.termo + '? Significado e origem da gíria'))

  // buscar dados relacionados separadamente
  const [
    { data: significados },
    { data: exemplos },
    { data: sinonimos },
    { data: categoria },
    { data: tagsRel },
    { data: catsMultiplas },
    { data: relacionadas },
    { data: autorPerfil },
    { data: opostos },
    { data: variacoesGenero },
    { data: plurais }
  ] = await Promise.all([
    sb.from('significados').select('descricao, ordem').eq('palavra_id', p.id).order('ordem'),
    sb.from('exemplos').select('frase').eq('palavra_id', p.id),
    sb.from('sinonimos').select('sinonimo').eq('palavra_id', p.id),
    p.categoria_id ? sb.from('categorias').select('id, nome, icone').eq('id', p.categoria_id).single() : Promise.resolve({ data: null }),
    sb.from('palavras_tags').select('tag_id, tags(nome)').eq('palavra_id', p.id),
    sb.from('palavras_categorias').select('categoria_id, subcategoria_id, categorias(id, nome, icone), subcategorias(id, nome)').eq('palavra_id', p.id),
    sb.from('palavras_relacionadas').select('relacionada').eq('palavra_id', p.id),
    p.usuario_id ? sb.from('perfis').select('username, nome, exibir_como, avatar_galeria, avatar_url, emoji').eq('id', p.usuario_id).single() : Promise.resolve({ data: null }),
    sb.from('opostos').select('oposto').eq('palavra_id', p.id),
    sb.from('variacoes_genero').select('valor, tipo').eq('palavra_id', p.id),
    sb.from('variacoes_plural').select('plural').eq('palavra_id', p.id)
  ])

  const tags = (tagsRel || []).map(t => t.tags?.nome).filter(Boolean)
  const reacoes = await carregarReacoes(p.id)
  const masculinos = (variacoesGenero || []).filter(v => v.tipo === 'masculino')
  const femininos = (variacoesGenero || []).filter(v => v.tipo === 'feminino')

  renderPalavra(p, significados || [], exemplos || [], sinonimos || [], categoria, tags, reacoes, catsMultiplas || [], relacionadas || [], autorPerfil, opostos || [], masculinos, femininos, plurais || [])

  // SEO: meta description + schema com o primeiro significado
  var sigTexto = ''
  if (significados && significados.length > 0) {
    var raw = significados[0].descricao || ''
    sigTexto = raw.includes('[extras]') ? raw.split('[extras]')[0].trim() : raw.trim()
    sigTexto = sigTexto.replace(/\n/g, ' ').substring(0, 155)
  }
  var descSEO = p.seo_descricao
    ? p.seo_descricao
    : sigTexto
      ? 'O que significa ' + p.termo + '? ' + sigTexto.split(' ').slice(0, 5).join(' ') + '... Veja abaixo o significado, a origem da gíria, sinônimos e exemplos.'
      : 'O que significa ' + p.termo + '? Veja abaixo o significado, a origem da gíria, sinônimos e exemplos.'

  var urlCanonica = 'https://cyberuniverso.com/palavra.html?w=' + encodeURIComponent(slug)

  // Meta description
  var metaDesc = document.getElementById('metaDesc')
  if (metaDesc) metaDesc.setAttribute('content', descSEO)
  var ogDesc = document.getElementById('ogDesc')
  if (ogDesc) ogDesc.setAttribute('content', descSEO)
  var twitterTitle = document.getElementById('twitterTitle')
  if (twitterTitle) twitterTitle.setAttribute('content', 'O que é ' + p.termo + '? — CyberDicionário')
  var twitterDesc = document.getElementById('twitterDesc')
  if (twitterDesc) twitterDesc.setAttribute('content', descSEO)

  // ── SCHEMA 1: DefinedTerm (enriquecido) ──
  var schemaDef = {
    "@context": "https://schema.org",
    "@type": "DefinedTerm",
    "name": p.termo,
    "description": sigTexto || descSEO,
    "url": urlCanonica,
    "inDefinedTermSet": {
      "@type": "DefinedTermSet",
      "name": "CyberDicionário — Dicionário de Gírias Brasileiras",
      "url": "https://cyberuniverso.com",
      "description": "Dicionário colaborativo de gírias e expressões do português brasileiro"
    }
  }
  if (p.pronuncia) schemaDef["alternateName"] = p.pronuncia
  if (sinonimos && sinonimos.length > 0) {
    schemaDef["sameAs"] = sinonimos.slice(0, 3).map(function(s) {
      return 'https://cyberuniverso.com/palavra.html?w=' + encodeURIComponent(s.sinonimo)
    })
  }

  // ── SCHEMA 2: FAQPage ──
  var faqEntries = []
  faqEntries.push({
    "@type": "Question",
    "name": "O que significa " + p.termo + "?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": sigTexto || ('Confira o significado completo de ' + p.termo + ' no CyberUniverso.')
    }
  })
  if (exemplos && exemplos.length > 0) {
    faqEntries.push({
      "@type": "Question",
      "name": "Como usar " + p.termo + " em uma frase?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": exemplos.slice(0, 2).map(function(e) { return '— ' + e.frase }).join(' ')
      }
    })
  }
  if (sinonimos && sinonimos.length > 0) {
    faqEntries.push({
      "@type": "Question",
      "name": "Quais são os sinônimos de " + p.termo + "?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": sinonimos.map(function(s) { return s.sinonimo }).join(', ')
      }
    })
  }
  var schemaFAQ = {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": faqEntries
  }

  // ── SCHEMA 3: BreadcrumbList ──
  var schemaBreadcrumb = {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Início", "item": "https://cyberuniverso.com" },
      { "@type": "ListItem", "position": 2, "name": "Todas as Palavras", "item": "https://cyberuniverso.com/todas.html" },
      { "@type": "ListItem", "position": 3, "name": p.termo, "item": urlCanonica }
    ]
  }

  // ── SCHEMA 4: Article ──
  var schemaArticle = {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "O que significa " + p.termo + "? Significado, origem e exemplos",
    "description": descSEO,
    "url": urlCanonica,
    "datePublished": p.criado_em,
    "dateModified": p.criado_em,
    "publisher": {
      "@type": "Organization",
      "name": "CyberDicionário",
      "url": "https://cyberuniverso.com"
    },
    "inLanguage": "pt-BR",
    "about": { "@type": "DefinedTerm", "name": p.termo }
  }

  // Injetar todos os schemas
  var schemas = [schemaDef, schemaFAQ, schemaBreadcrumb, schemaArticle]
  schemas.forEach(function(s) {
    var tag = document.createElement('script')
    tag.type = 'application/ld+json'
    tag.textContent = JSON.stringify(s)
    document.head.appendChild(tag)
  })

  await carregarComentarios(p.id)
  await carregarVizinhas(p.termo)
  // Registrar visualização
  sb.from('visualizacoes').insert({ palavra_id: p.id }).then(function() {})
}

async function carregarReacoes(pid) {
  const tipos = ['daora', 'rachei', 'tendnao', 'bizarro', 'amei']
  const counts = {}
  for (const tipo of tipos) {
    const { count } = await sb.from('reacoes').select('*', { count: 'exact', head: true }).eq('palavra_id', pid).eq('tipo', tipo)
    counts[tipo] = count || 0
  }
  // Verificar reação do visitante atual (logado ou anônimo)
  const uid = userSession ? userSession.user.id : getAnonId()
  const { data } = await sb.from('reacoes').select('tipo').eq('palavra_id', pid).eq('usuario_id', uid).maybeSingle()
  reacaoAtiva = data?.tipo || null
  return counts
}

function renderPalavra(p, significados, exemplos, sinonimos, categoria, tags, reacoes, catsMultiplas, relacionadas, autorPerfil, opostos, masculinos, femininos, plurais) {
  const dataFmt = new Date(p.criado_em).toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })
  const main = document.getElementById('mainCol')
  main.innerHTML =
    '<div class="breadcrumb"><a href="index.html">Início</a><span style="color:#2a4a7a"> › </span><a href="todas.html">Todas</a><span style="color:#2a4a7a"> › </span><span style="color:var(--ciano)">' + p.termo + '</span></div>' +
    '<h1 class="palavra-titulo" id="palavraTitulo">' + p.termo.toUpperCase() + '</h1>' +
    (p.pronuncia ? '<div class="pronuncia">🔊 Como pronunciar: <span>' + p.pronuncia + '</span></div>' : '') +
    (function() {
      var nomeAutor = 'Visitante'
      var linkAutor = null
      if (autorPerfil) {
        nomeAutor = autorPerfil.exibir_como === 'nome' && autorPerfil.nome ? autorPerfil.nome : '@' + (autorPerfil.username || 'usuário')
        linkAutor = 'perfil.html?id=' + p.usuario_id
      } else if (p.enviado_por && p.enviado_por !== 'Visitante') {
        nomeAutor = p.enviado_por
      }
      var avatarHtml = autorPerfil?.emoji
        ? '<div class="avatar" style="font-size:18px;">' + autorPerfil.emoji + '</div>'
        : '<div class="avatar">' + nomeAutor[0].toUpperCase() + '</div>'
      var autorHtml = linkAutor
        ? '<a href="' + linkAutor + '" style="color:var(--ciano);font-weight:800;text-decoration:none;">' + nomeAutor + '</a>'
        : '<strong>' + nomeAutor + '</strong>'
      return '<div class="meta-info">' + avatarHtml + '<div class="meta-text">Adicionado por ' + autorHtml + ' em <strong>' + dataFmt + '</strong></div></div>'
    })() +
    (function() {
      // múltiplas categorias
      var catsParaExibir = catsMultiplas && catsMultiplas.length > 0 ? catsMultiplas : (categoria ? [{ categorias: categoria, subcategorias: null }] : [])
      if (!catsParaExibir.length) return ''
      var html = '<div class="categorias">'
      catsParaExibir.forEach(function(c) {
        var cat = c.categorias
        var sub = c.subcategorias
        if (!cat) return
        html += '<a href="categoria.html?c=' + cat.id + '" class="cat-tag">' + (cat.icone || '📁') + ' ' + cat.nome + (sub ? ' › ' + sub.nome : '') + '</a>'
      })
      html += '</div>'
      return html
    })() +
    (tags.length ? '<div class="tags-section"><span class="tags-label">#</span>' + tags.map(t => '<a href="tag.html?t=' + encodeURIComponent(t) + '" class="hash-tag">#' + t + '</a>').join('') + '</div>' : '') +
    '<div class="badges">' +
    (p.nivel_uso ? '<div class="badge badge-nivel">⚡ ' + p.nivel_uso + '</div>' : '') +
    (p.regiao ? '<div class="badge badge-regiao">📍 ' + p.regiao + '</div>' : '') +
    (p.contexto ? '<div class="badge badge-contexto">🌐 ' + p.contexto + '</div>' : '') +
    (p.epoca ? '<div class="badge badge-epoca">📅 ' + p.epoca + '</div>' : '') +
    '</div>' +
    (p.imagem_url ? '<div class="palavra-imagem"><img src="' + p.imagem_url + '" alt="' + p.termo + '"></div>' : '') +
    (significados.length ? renderSignificados(significados, p.termo) : '') +
    (exemplos.length ? renderExemplos(exemplos) : '') +
    (sinonimos.length ? renderSinonimos(sinonimos) : '') +
    (opostos && opostos.length ? renderOpostos(opostos) : '') +
    (masculinos && masculinos.length || femininos && femininos.length ? renderVariacoesGenero(masculinos, femininos) : '') +
    (plurais && plurais.length ? renderPlurais(plurais) : '') +
    (relacionadas && relacionadas.length ? renderRelacionadas(relacionadas) : '') +
    renderReacoes(reacoes) +
    '<div class="card" id="navAlfaCard"><div class="card-title">🔤 Navegação alfabética</div><div class="alfa-nav" id="navAlfa"><span style="color:#4a6fa5">Carregando...</span></div></div>' +
    renderCompartilhar(p.termo) +
    '<div class="card"><div class="card-title">💬 Comentários <span id="comentariosCount" style="font-size:14px;color:#4a6fa5;font-family:Nunito,sans-serif;font-weight:700;"></span></div><div id="comentariosLista"></div><div class="comment-form"><textarea id="comentarioTexto" placeholder="Deixe seu comentário..."></textarea><button class="btn-comentar" onclick="enviarComentario()">COMENTAR</button></div></div>'

  ajustarTitulo()
}

function renderSignificados(sigs, termo) {
  var html = '<div class="card"><div class="card-title">📖 Significado</div>'
  sigs.forEach(function(s, i) {
    var texto = s.descricao
    var extras = []
    if (texto && texto.indexOf('[extras]') !== -1) {
      var parts = texto.split('[extras]')
      texto = parts[0].trim()
      try { extras = JSON.parse(parts[1]) } catch(e) {}
    }
    html += '<div class="significado-bloco"><div class="sig-header"><div class="sig-numero">' + (i+1) + '</div></div><p class="significado-text">' + texto.replace(/\n/g, '<br>') + '</p>'
    extras.forEach(function(ex) {
      if (ex.titulo) html += '<div class="subtitulo">' + ex.titulo + '</div>'
      if (ex.texto) html += '<p class="origem-text">' + ex.texto.replace(/\n/g, '<br>') + '</p>'
    })
    html += '</div>'
  })
  html += '<a class="btn-novo-sig" href="enviar.html?termo=' + encodeURIComponent(termo) + '">✍️ Conhece outro significado? Envie o seu!</a>'
  html += '</div>'
  return html
}

function renderExemplos(exemplos) {
  var html = '<div class="card"><div class="card-title">💬 Exemplos em frases</div>'
  exemplos.forEach(function(e) { html += '<div class="exemplo">— ' + e.frase + '</div>' })
  html += '</div>'
  return html
}

function renderSinonimos(sinonimos) {
  var html = '<div class="card"><div class="card-title">🔄 Sinônimos</div><div class="tags-list">'
  sinonimos.forEach(function(s) {
    var sl = s.sinonimo.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
    html += '<a href="tag.html?t=' + encodeURIComponent(s.sinonimo) + '" class="tag">' + s.sinonimo + '</a>'
  })
  html += '</div></div>'
  return html
}

function renderRelacionadas(relacionadas) {
  var html = '<div class="card"><div class="card-title">🔀 Palavras Relacionadas</div><div class="tags-list">'
  relacionadas.forEach(function(r) {
    var sl = r.relacionada.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
    html += '<a href="palavra.html?w=' + sl + '" class="tag">' + r.relacionada + '</a>'
  })
  html += '</div></div>'
  return html
}

function renderOpostos(opostos) {
  var html = '<div class="card"><div class="card-title">⚡ Opostos</div><div class="tags-list">'
  opostos.forEach(function(o) {
    var sl = o.oposto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
    html += '<a href="palavra.html?w=' + sl + '" class="tag">' + o.oposto + '</a>'
  })
  html += '</div></div>'
  return html
}

function renderVariacoesGenero(masculinos, femininos) {
  var html = '<div class="card"><div class="card-title">🔄 Variações de Gênero</div><div style="display:flex;gap:24px;flex-wrap:wrap;">'
  if (masculinos && masculinos.length) {
    html += '<div><div style="font-size:11px;font-weight:800;color:#4a8aff;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">♂️ Masculino</div><div class="tags-list">'
    masculinos.forEach(function(m) {
      var sl = m.valor.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
      html += '<a href="palavra.html?w=' + sl + '" class="tag">' + m.valor + '</a>'
    })
    html += '</div></div>'
  }
  if (femininos && femininos.length) {
    html += '<div><div style="font-size:11px;font-weight:800;color:#ff64c8;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">♀️ Feminino</div><div class="tags-list">'
    femininos.forEach(function(f) {
      var sl = f.valor.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
      html += '<a href="palavra.html?w=' + sl + '" class="tag">' + f.valor + '</a>'
    })
    html += '</div></div>'
  }
  html += '</div></div>'
  return html
}

function renderPlurais(plurais) {
  var html = '<div class="card"><div class="card-title">📦 Plural</div><div class="tags-list">'
  plurais.forEach(function(pl) {
    var sl = pl.plural.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
    html += '<a href="palavra.html?w=' + sl + '" class="tag">' + pl.plural + '</a>'
  })
  html += '</div></div>'
  return html
}

function renderReacoes(reacoes) {
  var tipos = [
    { tipo: 'daora', emoji: '🔥', label: 'DAORA' },
    { tipo: 'rachei', emoji: '😂', label: 'RACHEI' },
    { tipo: 'tendnao', emoji: '🤔', label: 'TENDI NÃO' },
    { tipo: 'bizarro', emoji: '👻', label: 'BIZARRO' },
    { tipo: 'amei', emoji: '😍', label: 'AMEI' }
  ]
  var html = '<div class="card"><div class="card-title">⚡ O que você achou?</div><div class="reacoes">'
  tipos.forEach(function(r) {
    var ativo = reacaoAtiva === r.tipo ? ' ativo' : ''
    html += '<button class="reacao-btn' + ativo + '" onclick="reagir(\'' + r.tipo + '\',this)" data-tipo="' + r.tipo + '">'
    html += '<span class="reacao-emoji">' + r.emoji + '</span>'
    html += '<span class="reacao-count">' + (reacoes[r.tipo] || 0) + '</span>'
    html += '<span class="reacao-label">' + r.label + '</span>'
    html += '</button>'
  })
  html += '</div></div>'
  return html
}

function renderCompartilhar(termo) {
  var url = encodeURIComponent(window.location.href)
  var t = encodeURIComponent(termo)
  return '<div class="card"><div class="card-title">📤 Compartilhar</div><div class="share-btns">' +
    '<a href="https://wa.me/?text=Sabia%20o%20que%20significa%20' + t + '%3F%20' + url + '" target="_blank" class="share-btn share-wpp">📱 WhatsApp</a>' +
    '<button class="share-btn share-copy" onclick="copiarLink()">🔗 Copiar link</button>' +
    '<a href="https://twitter.com/intent/tweet?text=Sabia%20o%20que%20significa%20' + t + '%3F" target="_blank" class="share-btn share-twitter">𝕏 Twitter</a>' +
    '</div></div>'
}

async function carregarComentarios(pid) {
  const { data } = await sb.from('comentarios').select('id, texto, criado_em').eq('palavra_id', pid).order('criado_em', { ascending: false })
  const lista = document.getElementById('comentariosLista')
  const count = document.getElementById('comentariosCount')
  if (!lista) return
  count.textContent = '(' + (data ? data.length : 0) + ')'
  if (!data || data.length === 0) { lista.innerHTML = '<div style="color:#4a6fa5;font-size:13px;margin-bottom:16px;">Seja o primeiro a comentar!</div>'; return }
  lista.innerHTML = data.map(function(c) {
    return '<div class="comentario"><div class="com-avatar">U</div><div class="com-body"><div class="com-meta"><strong>Usuário</strong> · ' + formatarData(c.criado_em) + '</div><div class="com-text">' + c.texto + '</div></div></div>'
  }).join('')
}

async function enviarComentario() {
  if (!userSession) { alert('Você precisa estar logado para comentar!'); window.location.href = 'cadastro.html'; return }
  var texto = document.getElementById('comentarioTexto').value.trim()
  if (!texto) return
  await sb.from('comentarios').insert({ palavra_id: palavraId, usuario_id: userSession.user.id, texto: texto })
  document.getElementById('comentarioTexto').value = ''
  await carregarComentarios(palavraId)
}

async function reagir(tipo, btn) {
  var uid = userSession ? userSession.user.id : getAnonId()
  var countEl = btn.querySelector('.reacao-count')
  var jaAtivo = btn.classList.contains('ativo')
  if (reacaoAtiva) {
    await sb.from('reacoes').delete().eq('palavra_id', palavraId).eq('usuario_id', uid)
    document.querySelectorAll('.reacao-btn').forEach(function(b) { b.classList.remove('ativo') })
  }
  if (!jaAtivo || reacaoAtiva !== tipo) {
    var res = await sb.from('reacoes').insert({ palavra_id: palavraId, usuario_id: uid, tipo: tipo })
    if (!res.error) { btn.classList.add('ativo'); countEl.textContent = parseInt(countEl.textContent) + 1; reacaoAtiva = tipo }
  } else {
    reacaoAtiva = null
    countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1)
  }
}



async function carregarVizinhas(termo) {
  var anterior = await sb.from('palavras').select('termo, slug').eq('status', 'aprovada').lt('termo', termo).order('termo', { ascending: false }).limit(3)
  var proxima = await sb.from('palavras').select('termo, slug').eq('status', 'aprovada').gt('termo', termo).order('termo', { ascending: true }).limit(3)
  var navAlfa = document.getElementById('navAlfa')
  if (!navAlfa) return
  var antHtml = (anterior.data || []).map(function(p) { return '<a href="palavra.html?w=' + p.slug + '" class="alfa-link">' + p.termo + '</a>' }).join('') || '<span style="color:#2a4a7a">—</span>'
  var proxHtml = (proxima.data || []).map(function(p) { return '<a href="palavra.html?w=' + p.slug + '" class="alfa-link">' + p.termo + '</a>' }).join('') || '<span style="color:#2a4a7a">—</span>'
  navAlfa.innerHTML = '<div class="alfa-grupo"><span class="alfa-label">◀ Anterior</span>' + antHtml + '</div><div class="alfa-sep">|</div><div class="alfa-grupo direita"><span class="alfa-label">Próxima ▶</span>' + proxHtml + '</div>'
}

async function carregarSidebar() {
  // Buscar top palavras por visualizações
  var { data: topViz } = await sb.rpc('top_palavras_visualizacoes', { limite: 10 })
  var st = document.getElementById('sidebarTop')
  if (!topViz || topViz.length === 0) {
    // fallback: mais recentes
    var { data: fallback } = await sb.from('palavras').select('termo, slug').eq('status', 'aprovada').order('criado_em', { ascending: false }).limit(10)
    topViz = (fallback || []).map(function(p) { return { termo: p.termo, slug: p.slug, total: 0 } })
  }
  if (topViz && st) {
    st.innerHTML = '<div class="sidebar-title">🏆 Top Palavras</div>' + topViz.map(function(p, i) {
      var cls = i===0?'ouro':i===1?'prata':i===2?'bronze':''
      return '<a href="palavra.html?w=' + p.slug + '" class="top-item"><span class="top-rank ' + cls + '">' + (i+1) + '</span><span class="top-word">' + p.termo + '</span></a>'
    }).join('')
  }
  var rec = await sb.from('palavras').select('termo, slug, criado_em').eq('status', 'aprovada').order('criado_em', { ascending: false }).limit(10)
  var sr = document.getElementById('sidebarRecentes')
  if (rec.data && sr) {
    sr.innerHTML = '<div class="sidebar-title">🆕 Últimas Adicionadas</div>' + rec.data.map(function(p) {
      return '<a href="palavra.html?w=' + p.slug + '" class="recente-item"><span class="recente-dot"></span><span class="recente-word">' + p.termo + '</span><span class="recente-data">' + formatarData(p.criado_em) + '</span></a>'
    }).join('')
  }
}

function mostrarNotFound(msg) {
  document.getElementById('mainCol').innerHTML = '<div class="not-found"><div class="not-found-emoji">🔍</div><div class="not-found-titulo">PALAVRA NÃO ENCONTRADA</div><div class="not-found-sub">' + msg + '</div><br><a href="todas.html" style="color:var(--ciano);font-weight:800;font-size:16px;">← Ver todas as palavras</a></div>'
}

function ajustarTitulo() {
  var el = document.getElementById('palavraTitulo')
  if (!el) return
  var len = el.textContent.trim().length
  el.classList.remove('curta','media','longa','muito-longa')
  if (len <= 6) el.classList.add('curta')
  else if (len <= 12) el.classList.add('media')
  else if (len <= 20) el.classList.add('longa')
  else el.classList.add('muito-longa')
}

function formatarData(str) {
  if (!str) return ''
  var d = new Date(str)
  var diff = Math.floor((Date.now() - d) / 86400000)
  if (diff === 0) return 'hoje'
  if (diff === 1) return 'ontem'
  if (diff < 7) return diff + ' dias'
  return d.toLocaleDateString('pt-BR')
}

function copiarLink() { navigator.clipboard.writeText(window.location.href).then(function() { alert('Link copiado! 🔗') }) }
function buscarSidebar() { var val = document.getElementById('sidebarBusca').value.trim(); if (val) window.location.href = 'todas.html?busca=' + encodeURIComponent(val) }

init()
