<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Senha — CyberUniverso</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- SDK do Supabase carregado primeiro -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #05080f;
    color: #e6f0ff;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #0a1628;
    border: 1px solid #1a3a6e;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 0 40px rgba(26, 110, 245, 0.15);
  }
  h1 {
    font-family: 'Bangers', cursive;
    letter-spacing: 1px;
    font-size: 2rem;
    margin: 0 0 8px;
    color: #00eaff;
    text-shadow: 0 0 12px rgba(0, 234, 255, 0.5);
  }
  p.sub {
    margin: 0 0 24px;
    color: #9fb3d9;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  label {
    display: block;
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 6px;
    color: #cfe0ff;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #1a3a6e;
    background: #05080f;
    color: #e6f0ff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    margin-bottom: 16px;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: #1a6ef5;
  }
  .req {
    font-size: 0.8rem;
    color: #9fb3d9;
    margin: -8px 0 18px;
  }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #1a6ef5;
    color: #fff;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #1558c2; }
  button:disabled { background: #1a3a6e; cursor: not-allowed; }

  .msg {
    margin-top: 18px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.4;
    display: none;
  }
  .msg.ok {
    background: rgba(0, 234, 255, 0.08);
    border: 1px solid #00eaff;
    color: #b6f5ff;
  }
  .msg.erro {
    background: rgba(245, 26, 26, 0.08);
    border: 1px solid #f51a1a;
    color: #ffb6b6;
  }
  .bloqueado {
    text-align: center;
    color: #9fb3d9;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .voltar {
    display: inline-block;
    margin-top: 16px;
    color: #00eaff;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>Nova Senha</h1>

    <div id="area-formulario" style="display:none;">
      <p class="sub">Cria sua senha nova. Recomendo pelo menos 12 caracteres, com números e símbolos.</p>

      <form id="form-nova-senha">
        <label for="senha1">Nova senha</label>
        <input type="password" id="senha1" required minlength="8" autocomplete="new-password">
        <p class="req">Mínimo de 8 caracteres.</p>

        <label for="senha2">Confirmar nova senha</label>
        <input type="password" id="senha2" required minlength="8" autocomplete="new-password">

        <button type="submit" id="btn-salvar">Salvar Nova Senha</button>
      </form>

      <div class="msg ok" id="msg-ok">✅ Senha atualizada! Já pode fazer login com a senha nova.</div>
      <div class="msg erro" id="msg-erro"></div>
    </div>

    <div id="area-bloqueada" class="bloqueado" style="display:none;">
      <p>⚠️ Esse link de recuperação não é válido ou já expirou.</p>
      <a href="esqueci-senha.html" class="voltar">Pedir um novo link →</a>
    </div>

    <div id="area-carregando" class="bloqueado">
      <p>Verificando o link...</p>
    </div>
  </div>

<script>
  const sb = window._supabase

  const areaCarregando = document.getElementById('area-carregando');
  const areaFormulario = document.getElementById('area-formulario');
  const areaBloqueada = document.getElementById('area-bloqueada');

  let sessaoValida = false;

  // O link do e-mail já vem com o token; o supabase-js processa ele
  // sozinho e dispara o evento PASSWORD_RECOVERY quando a página carrega.
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      sessaoValida = true;
      areaCarregando.style.display = 'none';
      areaFormulario.style.display = 'block';
    }
  });

  // Se depois de alguns segundos nada acontecer, o link é inválido/expirado
  setTimeout(function () {
    if (!sessaoValida) {
      areaCarregando.style.display = 'none';
      areaBloqueada.style.display = 'block';
    }
  }, 4000);

  const form = document.getElementById('form-nova-senha');
  const btn = document.getElementById('btn-salvar');
  const msgOk = document.getElementById('msg-ok');
  const msgErro = document.getElementById('msg-erro');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    msgOk.style.display = 'none';
    msgErro.style.display = 'none';

    const senha1 = document.getElementById('senha1').value;
    const senha2 = document.getElementById('senha2').value;

    if (senha1 !== senha2) {
      msgErro.textContent = '⚠️ As senhas não são iguais.';
      msgErro.style.display = 'block';
      return;
    }
    if (senha1.length < 8) {
      msgErro.textContent = '⚠️ A senha precisa ter pelo menos 8 caracteres.';
      msgErro.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Salvando...';

    const { error } = await sb.auth.updateUser({ password: senha1 });

    btn.disabled = false;
    btn.textContent = 'Salvar Nova Senha';

    if (error) {
      msgErro.textContent = '⚠️ Não deu pra salvar: ' + error.message;
      msgErro.style.display = 'block';
    } else {
      form.style.display = 'none';
      msgOk.style.display = 'block';
    }
  });
</script>

<script src="./header.js"></script>
</body>
</html>
