<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Categoria — CyberUniverso</title>
<meta name="description" id="pageDesc" content="Explore as gírias desta categoria no CyberUniverso.">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--azul:#1a6ef5;--azul-escuro:#0d3fa6;--amarelo:#f5e800;--ciano:#00eaff;--fundo:#05080f;--card:#0a1628;--card2:#0d1f3c;--borda:#1a3a6e;--texto:#d0e4ff;}
  body{font-family:'Nunito',sans-serif;background:var(--fundo);color:var(--texto);overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}
















  .page-wrap{max-width:900px;margin:0 auto;padding:90px 16px 60px;}

  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#4a6fa5;margin-bottom:24px;flex-wrap:wrap;}
  .breadcrumb a{color:#4a6fa5;text-decoration:none;transition:color 0.2s;}
  .breadcrumb a:hover{color:var(--ciano);}
  .breadcrumb span{color:#2a4a7a;}

  .cat-hero{background:var(--card);border:1px solid var(--borda);border-radius:20px;padding:32px 28px;margin-bottom:28px;position:relative;overflow:hidden;animation:fadeUp 0.5s both;}
  .cat-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--azul),var(--ciano),transparent);}
  @keyframes fadeUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .cat-hero-top{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .cat-hero-emoji{font-size:56px;line-height:1;}
  .cat-hero-info{flex:1;}
  .cat-hero-nome{font-family:'Bangers',cursive;font-size:clamp(32px,8vw,54px);letter-spacing:3px;color:var(--amarelo);text-shadow:2px 2px 0 var(--azul);-webkit-text-stroke:1px var(--azul);line-height:1;}
  .cat-hero-desc{font-size:15px;color:#4a6fa5;margin-top:6px;font-weight:600;line-height:1.5;}
  .cat-hero-stats{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;}
  .stat{background:var(--card2);border:1px solid var(--borda);border-radius:10px;padding:8px 16px;text-align:center;}
  .stat-num{font-family:'Bangers',cursive;font-size:22px;color:var(--ciano);}
  .stat-label{font-size:11px;color:#4a6fa5;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .ordem-btns{display:flex;gap:8px;}
  .ordem-btn{background:var(--card2);border:1px solid var(--borda);color:var(--texto);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .ordem-btn:hover,.ordem-btn.ativo{background:var(--azul);color:#fff;border-color:var(--azul);}
  .busca-mini{display:flex;background:var(--card);border:1.5px solid var(--borda);border-radius:8px;overflow:hidden;transition:border-color 0.2s;}
  .busca-mini:focus-within{border-color:var(--azul);}
  .busca-mini input{background:none;border:none;outline:none;padding:8px 12px;color:var(--texto);font-family:'Nunito',sans-serif;font-size:13px;width:160px;}
  .busca-mini input::placeholder{color:#2a4a7a;}
  .busca-mini button{background:none;border:none;padding:0 10px;color:#4a6fa5;cursor:pointer;}

  .palavras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
  .palavra-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:16px 18px;text-decoration:none;transition:all 0.2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:6px;animation:fadeUp 0.4s both;}
  .palavra-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--azul);transform:scaleY(0);transition:transform 0.25s;transform-origin:bottom;}
  .palavra-card:hover{border-color:var(--azul);transform:translateY(-3px);}
  .palavra-card:hover::before{transform:scaleY(1);}
  .pc-nome{font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px;color:var(--amarelo);transition:color 0.2s;}
  .palavra-card:hover .pc-nome{color:var(--ciano);}
  .pc-def{font-size:13px;color:#4a6fa5;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .pc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
  .pc-seta{font-size:14px;color:#2a4a7a;transition:color 0.2s;}
  .palavra-card:hover .pc-seta{color:var(--ciano);}

  .vazio{text-align:center;padding:60px 20px;color:#4a6fa5;}
  .vazio-emoji{font-size:48px;margin-bottom:12px;}
  .vazio-texto{font-family:'Fredoka One',cursive;font-size:20px;}

  .skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:14px;height:100px;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  @media(max-width:600px){
    .palavras-grid{grid-template-columns:1fr;}
  
  
    .toolbar{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="breadcrumb">
    <a href="index.html">Início</a>
    <span>›</span>
    <a href="categorias.html">Categorias</a>
    <span>›</span>
    <span style="color:var(--ciano)" id="breadNome">...</span>
  </div>

  <div class="cat-hero" id="catHero">
    <div class="cat-hero-top">
      <div class="cat-hero-emoji" id="catEmoji">📁</div>
      <div class="cat-hero-info">
        <div class="cat-hero-nome" id="catNome">Carregando...</div>
        <div class="cat-hero-desc" id="catDesc"></div>
      </div>
    </div>
    <div class="cat-hero-stats">
      <div class="stat">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Palavras</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="ordem-btns">
      <button class="ordem-btn ativo" onclick="ordenar('az',this)">A-Z</button>
      <button class="ordem-btn" onclick="ordenar('novas',this)">🆕 Novas</button>
    </div>
    <div class="busca-mini">
      <input type="text" id="buscaInput" placeholder="Filtrar..." oninput="filtrarLocal(this.value)">
      <button>🔍</button>
    </div>
  </div>

  <div class="palavras-grid" id="palavrasGrid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>
<script>
const sb = window._supabase

function escapeHtml(s) {
  if (s === null || s === undefined) return ''
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
}
const params = new URLSearchParams(window.location.search)
const catId = params.get('c')
const isSub = params.get('sub') === '1'

let todasPalavras = []
let ordemAtual = 'az'

async function init() {
  if (!catId) {
    window.location.href = 'categorias.html'
    return
  }

  // buscar info da categoria ou subcategoria
  if (isSub) {
    const { data: sub } = await sb.from('subcategorias').select('id, nome, descricao, categorias(id, nome, icone)').eq('id', catId).single()
    if (sub) {
      const catPai = sub.categorias
      document.getElementById('pageTitle').textContent = sub.nome + ' — CyberUniverso'
      document.getElementById('breadNome').textContent = sub.nome
      document.getElementById('catEmoji').textContent = catPai?.icone || '📂'
      document.getElementById('catNome').textContent = sub.nome.toUpperCase()
      document.getElementById('catDesc').textContent = sub.descricao || (catPai ? 'Subcategoria de ' + catPai.nome : '')
    }
    await carregarPalavrasSubcat(catId)
  } else {
    const { data: cat } = await sb.from('categorias').select('id, nome, icone, descricao').eq('id', catId).single()
    if (cat) {
      document.getElementById('pageTitle').textContent = cat.nome + ' — CyberUniverso'
      document.getElementById('breadNome').textContent = cat.nome
      document.getElementById('catEmoji').textContent = cat.icone || '📁'
      document.getElementById('catNome').textContent = cat.nome.toUpperCase()
      document.getElementById('catDesc').textContent = cat.descricao || ''
    }
    await carregarPalavrasCategoria(catId)
  }
}

// ── PALAVRAS DE UMA CATEGORIA (principal + múltiplas) ──
async function carregarPalavrasCategoria(id) {
  // busca pela categoria_id principal
  const { data: p1 } = await sb.from('palavras')
    .select('id, termo, slug, criado_em, significados(descricao, ordem)')
    .eq('categoria_id', id)
    .eq('status', 'aprovada')
    .order('termo')

  // busca pela tabela palavras_categorias (múltiplas)
  const { data: pCats } = await sb.from('palavras_categorias')
    .select('palavras(id, termo, slug, criado_em, significados(descricao, ordem))')
    .eq('categoria_id', id)

  // juntar e deduplicar
  const mapaIds = new Set()
  const todas = []

  for (const p of (p1 || [])) {
    if (!mapaIds.has(p.id)) { mapaIds.add(p.id); todas.push(p) }
  }
  for (const pc of (pCats || [])) {
    const p = pc.palavras
    if (p && !mapaIds.has(p.id)) { mapaIds.add(p.id); todas.push(p) }
  }

  todasPalavras = todas.sort((a, b) => a.termo.localeCompare(b.termo))
  document.getElementById('statTotal').textContent = todasPalavras.length
  renderizar(todasPalavras)
}

// ── PALAVRAS DE UMA SUBCATEGORIA ──
async function carregarPalavrasSubcat(id) {
  // pela subcategoria_id principal
  const { data: p1 } = await sb.from('palavras')
    .select('id, termo, slug, criado_em, significados(descricao, ordem)')
    .eq('subcategoria_id', id)
    .eq('status', 'aprovada')
    .order('termo')

  // pela tabela palavras_categorias
  const { data: pCats } = await sb.from('palavras_categorias')
    .select('palavras(id, termo, slug, criado_em, significados(descricao, ordem))')
    .eq('subcategoria_id', id)

  const mapaIds = new Set()
  const todas = []

  for (const p of (p1 || [])) {
    if (!mapaIds.has(p.id)) { mapaIds.add(p.id); todas.push(p) }
  }
  for (const pc of (pCats || [])) {
    const p = pc.palavras
    if (p && !mapaIds.has(p.id)) { mapaIds.add(p.id); todas.push(p) }
  }

  todasPalavras = todas.sort((a, b) => a.termo.localeCompare(b.termo))
  document.getElementById('statTotal').textContent = todasPalavras.length
  renderizar(todasPalavras)
}

// ── RENDERIZAR ──
function renderizar(lista) {
  const grid = document.getElementById('palavrasGrid')

  if (!lista || lista.length === 0) {
    grid.innerHTML = `
      <div class="vazio" style="grid-column:1/-1">
        <div class="vazio-emoji">🔍</div>
        <div class="vazio-texto">Nenhuma palavra nesta categoria ainda</div>
      </div>`
    return
  }

  grid.innerHTML = lista.map((p, i) => {
    // pegar primeiro significado (limpo, sem [extras])
    const sigs = (p.significados || []).sort((a, b) => (a.ordem || 0) - (b.ordem || 0))
    let def = sigs.length > 0 ? sigs[0].descricao || '' : ''
    if (def.includes('[extras]')) def = def.split('[extras]')[0].trim()

    return `
      <a href="palavra.html?w=${encodeURIComponent(p.slug)}" class="palavra-card" style="animation-delay:${i * 0.04}s">
        <div class="pc-nome">${escapeHtml(p.termo)}</div>
        ${def ? `<div class="pc-def">${escapeHtml(def)}</div>` : ''}
        <div class="pc-footer">
          <span class="pc-seta">→</span>
        </div>
      </a>`
  }).join('')
}

// ── ORDENAR ──
function ordenar(tipo, btn) {
  document.querySelectorAll('.ordem-btn').forEach(b => b.classList.remove('ativo'))
  btn.classList.add('ativo')
  ordemAtual = tipo

  const lista = [...todasPalavras]
  if (tipo === 'az') lista.sort((a, b) => a.termo.localeCompare(b.termo))
  else if (tipo === 'novas') lista.sort((a, b) => new Date(b.criado_em) - new Date(a.criado_em))

  renderizar(lista)
}

// ── FILTRAR LOCAL ──
function filtrarLocal(q) {
  const f = q.toLowerCase().trim()
  if (!f) { renderizar(todasPalavras); return }
  const filtrado = todasPalavras.filter(p => p.termo.toLowerCase().includes(f))
  renderizar(filtrado)
}

init()
</script>
<script src="./header.js"></script>
</body>
</html>
