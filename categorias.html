<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorias — CyberCity Dicionário</title>
<meta name="description" content="Explore todas as categorias de gírias e expressões do CyberCity.">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--azul:#1a6ef5;--azul-escuro:#0d3fa6;--amarelo:#f5e800;--ciano:#00eaff;--fundo:#05080f;--card:#0a1628;--card2:#0d1f3c;--borda:#1a3a6e;--texto:#d0e4ff;}
  body{font-family:'Nunito',sans-serif;background:var(--fundo);color:var(--texto);overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(5,8,15,0.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--borda);}
  .logo-main{font-family:'Bangers',cursive;font-size:28px;color:var(--ciano);text-shadow:0 0 10px var(--ciano),0 0 30px rgba(0,234,255,0.4);letter-spacing:2px;text-decoration:none;}
  .nav-links{display:flex;gap:20px;}
  .nav-links a{color:var(--texto);text-decoration:none;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s;}
  .nav-links a:hover,.nav-links a.ativo{color:var(--amarelo);}
  .menu-btn{display:none;background:none;border:1.5px solid var(--borda);border-radius:6px;padding:8px 10px;cursor:pointer;flex-direction:column;gap:4px;}
  .menu-btn span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;}
  .nav-mobile{display:none;position:fixed;top:0;right:0;width:260px;height:100vh;background:rgba(5,8,15,0.98);border-left:1px solid var(--borda);flex-direction:column;padding:70px 25px 25px;gap:8px;z-index:200;}
  .nav-mobile.open{display:flex;}
  .nav-mobile a{color:var(--texto);text-decoration:none;font-size:16px;font-weight:700;padding:12px 0;border-bottom:1px solid var(--borda);}
  .nav-mobile a:hover{color:var(--amarelo);}
  .close-nav{position:absolute;top:18px;right:18px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;}
  .overlay.open{display:block;}

  .page-wrap{max-width:1000px;margin:0 auto;padding:90px 16px 60px;}

  .page-hero{text-align:center;padding:40px 0 36px;position:relative;}
  .page-hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--azul),transparent);}
  .page-titulo{font-family:'Bangers',cursive;font-size:clamp(42px,10vw,72px);letter-spacing:4px;color:var(--amarelo);text-shadow:3px 3px 0 var(--azul),6px 6px 0 var(--azul-escuro);-webkit-text-stroke:1.5px var(--azul);animation:titlePop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;}
  @keyframes titlePop{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .page-sub{font-size:15px;color:#4a6fa5;margin-top:8px;font-weight:700;}

  .busca-wrap{margin:28px 0 32px;}
  .busca-row{display:flex;background:var(--card);border:1.5px solid var(--borda);border-radius:12px;overflow:hidden;transition:border-color 0.2s;}
  .busca-row:focus-within{border-color:var(--azul);}
  .busca-row input{flex:1;background:none;border:none;outline:none;padding:14px 18px;color:var(--texto);font-family:'Nunito',sans-serif;font-size:15px;}
  .busca-row input::placeholder{color:#2a4a7a;}
  .busca-row button{background:var(--azul);border:none;padding:0 20px;color:#fff;font-size:18px;cursor:pointer;}

  .grupo-secao{margin-bottom:40px;animation:fadeUp 0.4s both;}
  @keyframes fadeUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .grupo-titulo{font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;color:var(--ciano);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .grupo-titulo::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--borda),transparent);}

  /* categoria principal */
  .cat-principal{background:var(--card);border:1px solid var(--borda);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color 0.3s;}
  .cat-principal.aberta{border-color:var(--azul);}

  .cat-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background 0.2s;user-select:none;}
  .cat-header:hover{background:rgba(26,110,245,0.06);}
  .cat-header.link-direto{text-decoration:none;}
  .cat-header.link-direto:hover .cat-nome-principal{color:var(--ciano);}

  .cat-emoji-grande{font-size:30px;flex-shrink:0;}
  .cat-info{flex:1;min-width:0;}
  .cat-nome-principal{font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px;color:var(--amarelo);transition:color 0.2s;line-height:1.1;}
  .cat-principal.aberta .cat-nome-principal{color:var(--ciano);}
  .cat-desc-principal{font-size:13px;color:#4a6fa5;font-weight:600;margin-top:3px;}
  .cat-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .cat-total{background:var(--card2);border:1px solid var(--borda);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;color:var(--texto);white-space:nowrap;}
  .cat-seta{font-size:16px;color:#4a6fa5;transition:transform 0.35s,color 0.2s;}
  .cat-principal.aberta .cat-seta{transform:rotate(180deg);color:var(--ciano);}

  /* subcategorias */
  .subcats-wrap{max-height:0;overflow:hidden;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1);}
  .subcats-wrap.aberta{max-height:700px;}
  .subcats-inner{padding:4px 16px 18px;border-top:1px solid var(--borda);background:rgba(0,0,0,0.25);}

  .ver-todos-link{display:flex;align-items:center;gap:8px;padding:12px 4px;text-decoration:none;border-bottom:1px solid var(--borda);margin-bottom:14px;transition:opacity 0.2s;}
  .ver-todos-link:hover{opacity:0.8;}
  .ver-todos-texto{font-size:13px;font-weight:800;color:var(--ciano);letter-spacing:0.5px;text-transform:uppercase;}
  .ver-todos-count{font-size:12px;color:#4a6fa5;font-weight:700;margin-left:auto;}

  .subcats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;}

  .subcat-card{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--borda);border-radius:10px;padding:10px 14px;text-decoration:none;transition:all 0.2s;}
  .subcat-card:hover{border-color:var(--azul);transform:translateY(-2px);}
  .subcat-card:hover .subcat-nome{color:var(--amarelo);}
  .subcat-emoji{font-size:20px;flex-shrink:0;}
  .subcat-body{flex:1;min-width:0;}
  .subcat-nome{font-size:14px;font-weight:800;color:var(--texto);transition:color 0.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .subcat-count{font-size:11px;color:#4a6fa5;font-weight:700;}

  .sem-resultado{text-align:center;padding:60px 20px;display:none;}
  .sem-resultado.visivel{display:block;}

  @media(max-width:600px){
    .subcats-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
    .nav-links{display:none;}
    .menu-btn{display:flex;}
    .cat-desc-principal{display:none;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-main">CyberCity</a>
  <div class="nav-links">
    <a href="index.html">Início</a>
    <a href="todas.html">Todas</a>
    <a href="categorias.html" class="ativo">Categorias</a>
    <a href="rimas.html">Rimas</a>
    <a href="tarot.html">Tarot</a>
    <a href="cadastro.html">Entrar</a>
  </div>
  <button class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="nav-mobile" id="navMobile">
  <button class="close-nav" onclick="toggleMenu()">✕</button>
  <a href="index.html">🏠 Início</a>
  <a href="todas.html">📖 Todas as Palavras</a>
  <a href="categorias.html">🗂️ Categorias</a>
  <a href="rimas.html">🎵 Rimas</a>
  <a href="tarot.html">🃏 Tarot de Gírias</a>
  <a href="cadastro.html">👤 Entrar / Cadastrar</a>
</nav>

<div class="page-wrap">

  <div class="page-hero">
    <h1 class="page-titulo">🗂️ CATEGORIAS</h1>
    <p class="page-sub">Clique numa categoria para ver as subcategorias</p>
  </div>

  <div class="busca-wrap">
    <div class="busca-row">
      <input type="text" id="buscaInput" placeholder="Buscar categoria ou subcategoria..." oninput="filtrar()">
      <button>🔍</button>
    </div>
  </div>

  <div id="conteudo"></div>
  <div class="sem-resultado" id="semResultado">
    <div style="font-size:48px">🤔</div>
    <div style="font-family:'Fredoka One',cursive;font-size:20px;color:#4a6fa5;margin-top:12px;">Nenhuma categoria encontrada</div>
  </div>

</div>

<script>
const dados = [
  {
    grupo:"🌍 Por Região",

      {
        emoji:"📍", nome:"Gírias Locais", slug:"girias-locais",
        desc:"Gírias de cada região e cidade do Brasil e do mundo",
        total:148,
        subcats:[
          {emoji:"🏙️", nome:"São Paulo", slug:"sao-paulo", count:45},
          {emoji:"🌊", nome:"Rio de Janeiro", slug:"rio-de-janeiro", count:38},
          {emoji:"🤠", nome:"Rio Grande do Sul", slug:"rio-grande-do-sul", count:22},
          {emoji:"🌴", nome:"Nordeste", slug:"nordeste", count:29},
          {emoji:"🌿", nome:"Minas Gerais", slug:"minas-gerais", count:19},
          {emoji:"🐊", nome:"Norte do Brasil", slug:"norte", count:14},
          {emoji:"🌸", nome:"Japão", slug:"japao", count:11},
          {emoji:"🇺🇸", nome:"Estados Unidos", slug:"eua", count:9},
          {emoji:"🌺", nome:"Havaí", slug:"havai", count:8},
          {emoji:"🇪🇸", nome:"Espanha", slug:"espanha", count:7},
        ]
      },
    ]
  },
  {
    grupo:"📱 Por Plataforma",
    cats:[
      {
        emoji:"🌐", nome:"Gírias da Internet", slug:"girias-internet",
        desc:"Expressões que nasceram e vivem no mundo digital",
        total:134,
        subcats:[
          {emoji:"🎵", nome:"TikTok", slug:"tiktok", count:41},
          {emoji:"💬", nome:"WhatsApp", slug:"whatsapp", count:35},
          {emoji:"📸", nome:"Instagram", slug:"instagram", count:28},
          {emoji:"▶️", nome:"YouTube", slug:"youtube", count:22},
          {emoji:"🎮", nome:"Twitch", slug:"twitch", count:18},
          {emoji:"🐦", nome:"Twitter / X", slug:"twitter", count:15},
          {emoji:"👾", nome:"Discord", slug:"discord", count:12},
          {emoji:"🔵", nome:"Facebook", slug:"facebook", count:9},
        ]
      },
    ]
  },
  {
    grupo:"📅 Por Época",
    cats:[
      {
        emoji:"⏳", nome:"Gírias por Época", slug:"girias-epoca",
        desc:"Como a linguagem evoluiu ao longo das décadas",
        total:220,
        subcats:[
          {emoji:"📼", nome:"Anos 80", slug:"anos-80", count:31},
          {emoji:"💿", nome:"Anos 90", slug:"anos-90", count:44},
          {emoji:"📀", nome:"Anos 2000", slug:"anos-2000", count:38},
          {emoji:"📱", nome:"Anos 2010", slug:"anos-2010", count:55},
          {emoji:"🚀", nome:"Anos 2020 até hoje", slug:"anos-2020", count:52},
        ]
      },
    ]
  },
  {
    grupo:"🎵 Por Cultura",
    cats:[
      {
        emoji:"🎤", nome:"Gírias do Funk", slug:"girias-funk",
        desc:"Do baile pra rua — o vocabulário do funk brasileiro",
        total:52,
        subcats:[
          {emoji:"🎶", nome:"Funk Carioca", slug:"funk-carioca", count:24},
          {emoji:"🎸", nome:"Funk Ostentação", slug:"funk-ostentacao", count:18},
          {emoji:"💃", nome:"Funk Melody", slug:"funk-melody", count:10},
        ]
      },
      {
        emoji:"🏄", nome:"Gírias do Surf", slug:"girias-surf",
        desc:"Da praia pro seu vocabulário — cultura do surf",
        total:21,
        subcats:[
          {emoji:"🌊", nome:"Manobras", slug:"manobras-surf", count:12},
          {emoji:"🌺", nome:"Cultura Havaiana", slug:"cultura-havaiana", count:9},
        ]
      },
      {
        emoji:"🛹", nome:"Gírias do Skate", slug:"girias-skate",
        desc:"O vocabulário das pistas e ruas",
        total:27,
        subcats:[
          {emoji:"🛹", nome:"Manobras de Skate", slug:"manobras-skate", count:15},
          {emoji:"🏙️", nome:"Street Skate", slug:"street-skate", count:12},
        ]
      },
      {
        emoji:"🎮", nome:"Gírias do Game", slug:"girias-game",
        desc:"Linguagem dos jogadores e streamers",
        total:43,
        subcats:[
          {emoji:"⚔️", nome:"RPG", slug:"rpg", count:14},
          {emoji:"🔫", nome:"FPS / Shooter", slug:"fps", count:16},
          {emoji:"⚽", nome:"Futebol Virtual", slug:"futebol-virtual", count:8},
          {emoji:"📱", nome:"Mobile Games", slug:"mobile-games", count:5},
        ]
      },
    ]
  },
  {
    grupo:"💬 Por Situação",
    cats:[
      {emoji:"👋", nome:"Cumprimentos", slug:"cumprimentos", desc:"Formas de cumprimentar e se despedir", total:33, subcats:[]},
      {
        emoji:"❤️", nome:"Gírias de Amor", slug:"girias-amor",
        desc:"Expressões do coração e dos relacionamentos",
        total:28,
        subcats:[
          {emoji:"😍", nome:"Paquera", slug:"paquera", count:12},
          {emoji:"💑", nome:"Relacionamento", slug:"relacionamento", count:10},
          {emoji:"💔", nome:"Término", slug:"termino", count:6},
        ]
      },
      {emoji:"😡", nome:"Xingamentos", slug:"xingamentos", desc:"Palavrões e xingamentos do vocabulário urbano", total:41, subcats:[]},
      {emoji:"😂", nome:"Expressões de Humor", slug:"humor", desc:"Pra morrer de rir ou fazer alguém rir", total:35, subcats:[]},
    ]
  },
  {
    grupo:"🌍 Por Origem",
    cats:[
      {emoji:"🇧🇷", nome:"Criadas no Brasil", slug:"criadas-brasil", desc:"Gírias 100% tupiniquins!", total:89, subcats:[]},
      {emoji:"🇺🇸", nome:"Do Inglês", slug:"do-ingles", desc:"Palavras absorvidas do inglês", total:48, subcats:[]},
      {emoji:"🌺", nome:"Do Havaiano", slug:"do-havaiano", desc:"A influência da cultura havaiana", total:8, subcats:[]},
    ]
  },
];

function renderizar(lista){
  const conteudo = document.getElementById('conteudo');
  const sem = document.getElementById('semResultado');
  if(!lista.length){
    conteudo.innerHTML='';
    sem.classList.add('visivel');
    return;
  }
  sem.classList.remove('visivel');
  conteudo.innerHTML = lista.map((grupo,gi)=>`
    <div class="grupo-secao" style="animation-delay:${gi*0.07}s">
      <div class="grupo-titulo">${grupo.grupo}</div>
      ${grupo.cats.map(cat=> cat.subcats.length > 0 ? `
        <div class="cat-principal" id="cat-${cat.slug}">
          <div class="cat-header" onclick="toggleCat('${cat.slug}')">
            <div class="cat-emoji-grande">${cat.emoji}</div>
            <div class="cat-info">
              <div class="cat-nome-principal">${cat.nome}</div>
              <div class="cat-desc-principal">${cat.desc}</div>
            </div>
            <div class="cat-meta">
              <div class="cat-total">${cat.total} palavras</div>
              <div class="cat-seta">▼</div>
            </div>
          </div>
          <div class="subcats-wrap" id="sub-${cat.slug}">
            <div class="subcats-inner">
              <a href="categoria.html?c=${cat.slug}" class="ver-todos-link">
                <span class="ver-todos-texto">🔍 Ver todas em ${cat.nome}</span>
                <span class="ver-todos-count">${cat.total} palavras →</span>
              </a>
              <div class="subcats-grid">
                ${cat.subcats.map(sub=>`
                  <a href="categoria.html?c=${sub.slug}" class="subcat-card">
                    <span class="subcat-emoji">${sub.emoji}</span>
                    <div class="subcat-body">
                      <div class="subcat-nome">${sub.nome}</div>
                      <div class="subcat-count">${sub.count} palavras</div>
                    </div>
                  </a>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      ` : `
        <div class="cat-principal" id="cat-${cat.slug}">
          <a href="categoria.html?c=${cat.slug}" class="cat-header link-direto">
            <div class="cat-emoji-grande">${cat.emoji}</div>
            <div class="cat-info">
              <div class="cat-nome-principal">${cat.nome}</div>
              <div class="cat-desc-principal">${cat.desc}</div>
            </div>
            <div class="cat-meta">
              <div class="cat-total">${cat.total} palavras</div>
              <div class="cat-seta" style="transform:rotate(-90deg)">▼</div>
            </div>
          </a>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleCat(slug){
  const card = document.getElementById('cat-'+slug);
  const sub = document.getElementById('sub-'+slug);
  if(!sub) return;
  const aberta = card.classList.contains('aberta');
  document.querySelectorAll('.cat-principal').forEach(c=>c.classList.remove('aberta'));
  document.querySelectorAll('.subcats-wrap').forEach(s=>s.classList.remove('aberta'));
  if(!aberta){ card.classList.add('aberta'); sub.classList.add('aberta'); }
}

function filtrar(){
  const q = document.getElementById('buscaInput').value.toLowerCase().trim();
  if(!q){ renderizar(dados); return; }
  const filtrado = dados.map(grupo=>{
    const cats = grupo.cats.map(cat=>{
      if(cat.nome.toLowerCase().includes(q)||cat.desc.toLowerCase().includes(q)) return cat;
      const subcatsOk = cat.subcats.filter(s=>s.nome.toLowerCase().includes(q));
      if(subcatsOk.length) return {...cat, subcats:subcatsOk};
      return null;
    }).filter(Boolean);
    return cats.length ? {...grupo, cats} : null;
  }).filter(Boolean);
  renderizar(filtrado);
}

function toggleMenu(){
  document.getElementById('navMobile').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

renderizar(dados);
</script>
</body>
</html>
