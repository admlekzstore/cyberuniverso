<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar / Cadastrar — CyberUniverso</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--azul:#1a6ef5;--azul-escuro:#0d3fa6;--amarelo:#f5e800;--ciano:#00eaff;--fundo:#05080f;--card:#0a1628;--card2:#0d1f3c;--borda:#1a3a6e;--texto:#d0e4ff;}
  body{font-family:'Nunito',sans-serif;background:var(--fundo);color:var(--texto);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}

  .bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
  .bg-glow::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(26,110,245,0.12) 0%,transparent 70%);border-radius:50%;}
  .bg-glow::after{content:'';position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(0,234,255,0.06) 0%,transparent 70%);border-radius:50%;}
















  .page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:90px 16px 40px;}

  .auth-container{width:100%;max-width:420px;animation:fadeUp 0.5s both;}
  @keyframes fadeUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .auth-logo{text-align:center;margin-bottom:28px;}
  .auth-logo-text{font-family:'Bangers',cursive;font-size:48px;color:var(--ciano);text-shadow:0 0 16px var(--ciano),0 0 40px rgba(0,234,255,0.3);letter-spacing:3px;}
  .auth-logo-sub{font-size:13px;color:#4a6fa5;font-weight:700;margin-top:4px;letter-spacing:1px;}

  .tabs{display:flex;background:var(--card2);border:1px solid var(--borda);border-radius:12px;padding:4px;margin-bottom:24px;}
  .tab{flex:1;text-align:center;padding:10px;font-family:'Bangers',cursive;font-size:18px;letter-spacing:1px;color:#4a6fa5;cursor:pointer;border-radius:9px;transition:all 0.2s;}
  .tab.ativo{background:var(--azul);color:#fff;}

  .auth-card{background:var(--card);border:1px solid var(--borda);border-radius:18px;padding:28px 24px;position:relative;overflow:hidden;}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--azul),var(--ciano),transparent);}

  .painel{display:none;}
  .painel.ativo{display:block;}

  .campo{margin-bottom:16px;}
  .campo label{display:block;font-size:13px;font-weight:800;color:#4a8aff;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;}
  .campo input{width:100%;background:var(--card2);border:1.5px solid var(--borda);border-radius:10px;padding:12px 16px;color:var(--texto);font-family:'Nunito',sans-serif;font-size:15px;transition:border-color 0.2s;outline:none;}
  .campo input:focus{border-color:var(--azul);}
  .campo input::placeholder{color:#2a4a7a;}

  .senha-wrap{position:relative;}
  .senha-wrap input{padding-right:44px;}
  .olho-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4a6fa5;cursor:pointer;font-size:18px;padding:4px;}

  .forca-wrap{margin-top:6px;}
  .forca-barra{height:4px;border-radius:2px;background:var(--card2);overflow:hidden;}
  .forca-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0%;}
  .forca-texto{font-size:11px;font-weight:700;margin-top:4px;color:#4a6fa5;}

  .btn-auth{width:100%;background:var(--azul);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
  .btn-auth:hover{background:#0050cc;transform:translateY(-2px);}
  .btn-auth:disabled{background:#1a3a6e;cursor:not-allowed;transform:none;opacity:0.7;}
  .exibir-opcoes{display:flex;gap:8px;margin-top:4px;}
  .exibir-opt{flex:1;text-align:center;padding:10px 8px;background:var(--card2);border:1.5px solid var(--borda);border-radius:10px;font-size:13px;font-weight:800;color:#4a6fa5;cursor:pointer;transition:all 0.2s;}
  .exibir-opt.ativo{background:rgba(26,110,245,0.2);border-color:var(--azul);color:#7ab0ff;}
  .exibir-opt:hover{border-color:var(--azul);}

  .divisor{display:flex;align-items:center;gap:12px;margin:20px 0;color:#2a4a7a;font-size:13px;font-weight:700;}
  .divisor::before,.divisor::after{content:'';flex:1;height:1px;background:var(--borda);}

  .link-extra{text-align:center;margin-top:16px;font-size:13px;color:#4a6fa5;}
  .link-extra a{color:var(--ciano);font-weight:800;text-decoration:none;}
  .link-extra a:hover{color:var(--amarelo);}

  .termos{font-size:12px;color:#2a4a7a;text-align:center;margin-top:14px;line-height:1.5;}
  .termos a{color:#4a6fa5;text-decoration:none;}
  .termos a:hover{color:var(--ciano);}

  .alerta{background:rgba(26,110,245,0.1);border:1px solid rgba(26,110,245,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#7ab0ff;margin-bottom:16px;display:none;}
  .alerta.visivel{display:block;}
  .alerta.erro{background:rgba(255,80,80,0.1);border-color:rgba(255,80,80,0.3);color:#ff8080;}
  .alerta.sucesso{background:rgba(100,255,150,0.1);border-color:rgba(100,255,150,0.3);color:#64ff96;}

  .logado-card{text-align:center;padding:20px 0;}
  .logado-avatar{font-size:60px;margin-bottom:12px;}
  .logado-nome{font-family:'Bangers',cursive;font-size:28px;color:var(--ciano);letter-spacing:2px;}
  .logado-email{font-size:13px;color:#4a6fa5;margin-top:4px;}
  .logado-acoes{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
  .btn-secundario{width:100%;background:var(--card2);color:var(--texto);border:1.5px solid var(--borda);border-radius:12px;padding:12px;font-family:'Bangers',cursive;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
  .btn-secundario:hover{border-color:var(--azul);color:var(--amarelo);}
  .btn-sair{background:rgba(255,80,80,0.1);border-color:rgba(255,80,80,0.3);color:#ff8080;}
  .btn-sair:hover{background:rgba(255,80,80,0.2);border-color:#ff4444;color:#ff4444;}

  @media(max-width:480px){
  
  
  }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="page-wrap">
  <div class="auth-container">

    <div class="auth-logo">
      <div class="auth-logo-text">CyberUniverso</div>
      <div class="auth-logo-sub">SEU GUIA NA EVOLUÇÃO DA LINGUAGEM</div>
    </div>

    <!-- USUÁRIO JÁ LOGADO -->
    <div class="auth-card" id="areaLogado" style="display:none;">
      <div class="logado-card">
        <div class="logado-avatar">👤</div>
        <div class="logado-nome" id="logadoNome">Olá!</div>
        <div class="logado-email" id="logadoEmail"></div>
        <div class="logado-acoes">
          <button class="btn-secundario" onclick="window.location.href='perfil-editar.html'">✏️ Editar meu perfil</button>
          <button class="btn-secundario" id="btnVerPerfil" onclick="">👤 Ver meu perfil</button>
          <button class="btn-secundario" onclick="window.location.href='index.html'">🏠 Ir para o início</button>
          <button class="btn-secundario" onclick="window.location.href='todas.html'">📖 Ver todas as palavras</button>
          <button class="btn-secundario btn-sair" onclick="sair()">🚪 Sair da conta</button>
        </div>
      </div>
    </div>

    <!-- FORMULÁRIOS LOGIN/CADASTRO -->
    <div id="areaAuth">
      <div class="tabs">
        <div class="tab ativo" onclick="trocarTab('entrar')">ENTRAR</div>
        <div class="tab" onclick="trocarTab('cadastrar')">CADASTRAR</div>
      </div>

      <div class="auth-card">
        <div id="alerta" class="alerta"></div>

        <!-- ENTRAR -->
        <div class="painel ativo" id="painel-entrar">
          <div class="campo">
            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com" id="login-email">
          </div>
          <div class="campo">
            <label>Senha</label>
            <div class="senha-wrap">
              <input type="password" placeholder="••••••••" id="login-senha">
              <button class="olho-btn" onclick="verSenha('login-senha',this)">👁️</button>
            </div>
          </div>
          <div style="text-align:right;margin-bottom:16px;">
            <a href="#" onclick="esqueceuSenha()" style="font-size:13px;color:#4a6fa5;text-decoration:none;font-weight:700;">Esqueci minha senha</a>
          </div>
          <button class="btn-auth" id="btn-entrar" onclick="entrar()">ENTRAR 🚀</button>
          <div class="link-extra">Não tem conta? <a href="#" onclick="trocarTab('cadastrar')">Cadastre-se grátis</a></div>
        </div>

        <!-- CADASTRAR -->
        <div class="painel" id="painel-cadastrar">
          <div class="campo">
            <label>Nome de usuário</label>
            <input type="text" placeholder="ex: surf_lover" id="cad-usuario" oninput="validarUsuario(this)">
          </div>
          <div class="campo">
            <label>Nome / Apelido / Personagem <span style="color:#4a6fa5;font-weight:600;">(opcional)</span></label>
            <input type="text" placeholder="ex: Surfista Anônimo, DarkWave, Anônimo..." id="cad-nome">
            <div style="font-size:12px;color:#2a4a7a;margin-top:5px;">Pode ser qualquer nome, apelido ou personagem!</div>
          </div>
          <div class="campo">
            <label>Exibir minhas contribuições como</label>
            <div class="exibir-opcoes">
              <div class="exibir-opt ativo" id="opt-username" onclick="selecionarExibir('username')">👤 Usuário</div>
              <div class="exibir-opt" id="opt-nome" onclick="selecionarExibir('nome')">🪪 Nome/Apelido</div>
            </div>
            <input type="hidden" id="cad-exibir" value="username">
          </div>
          <div class="campo">
            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com" id="cad-email">
          </div>
          <div class="campo">
            <label>Senha</label>
            <div class="senha-wrap">
              <input type="password" placeholder="mínimo 6 caracteres" id="cad-senha" oninput="verificarForca(this.value)">
              <button class="olho-btn" onclick="verSenha('cad-senha',this)">👁️</button>
            </div>
            <div class="forca-wrap">
              <div class="forca-barra"><div class="forca-fill" id="forcaFill"></div></div>
              <div class="forca-texto" id="forcaTexto"></div>
            </div>
          </div>
          <div class="campo">
            <label>Confirmar senha</label>
            <div class="senha-wrap">
              <input type="password" placeholder="repita a senha" id="cad-confirma">
              <button class="olho-btn" onclick="verSenha('cad-confirma',this)">👁️</button>
            </div>
          </div>
          <button class="btn-auth" id="btn-cadastrar" onclick="cadastrar()">CRIAR CONTA ✨</button>
          <div class="termos">Ao criar sua conta você concorda com os <a href="privacidade.html">Termos de Uso</a> e <a href="privacidade.html">Política de Privacidade</a></div>
          <div class="link-extra">Já tem conta? <a href="#" onclick="trocarTab('entrar')">Entrar</a></div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- SDK do Supabase carregado primeiro -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>

<script>
  const sb = window._supabase

  // ── VERIFICAR SE JÁ ESTÁ LOGADO ──
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) mostrarAreaLogado(session.user)
  })

  // ── ENTRAR ──
  async function entrar() {
    const email = document.getElementById('login-email').value.trim()
    const senha = document.getElementById('login-senha').value
    if (!email || !senha) { mostrarAlerta('⚠️ Preencha todos os campos.', 'erro'); return }

    const btn = document.getElementById('btn-entrar')
    btn.disabled = true
    btn.textContent = 'Entrando...'

    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha })

    if (error) {
      mostrarAlerta('❌ ' + traduzirErro(error.message), 'erro')
      btn.disabled = false
      btn.textContent = 'ENTRAR 🚀'
      return
    }

    mostrarAlerta('✅ Login realizado! Redirecionando...', 'sucesso')
    setTimeout(() => window.location.href = 'index.html', 1500)
  }

  // ── CADASTRAR ──
  async function cadastrar() {
    const usuario = document.getElementById('cad-usuario').value.trim()
    const email = document.getElementById('cad-email').value.trim()
    const senha = document.getElementById('cad-senha').value
    const confirma = document.getElementById('cad-confirma').value

    if (!usuario || !email || !senha) { mostrarAlerta('⚠️ Preencha todos os campos.', 'erro'); return }
    if (senha.length < 6) { mostrarAlerta('⚠️ Senha precisa ter pelo menos 6 caracteres.', 'erro'); return }
    if (senha !== confirma) { mostrarAlerta('⚠️ As senhas não coincidem.', 'erro'); return }

    const btn = document.getElementById('btn-cadastrar')
    btn.disabled = true
    btn.textContent = 'Criando conta...'

    const { data, error } = await sb.auth.signUp({ email, password: senha })

    if (error) {
      mostrarAlerta('❌ ' + traduzirErro(error.message), 'erro')
      btn.disabled = false
      btn.textContent = 'CRIAR CONTA ✨'
      return
    }

    if (data.user) {
      const nome = document.getElementById('cad-nome').value.trim()
      const exibir = document.getElementById('cad-exibir').value
      await sb.from('perfis').insert({
        id: data.user.id,
        username: usuario,
        nome: nome || null,
        exibir_como: exibir
      })
    }

    mostrarAlerta('✅ Conta criada com sucesso! Bem-vindo ao CyberUniverso!', 'sucesso')
    setTimeout(() => window.location.href = 'enviar.html', 2000)
  }

  // ── SAIR ──
  async function sair() {
    await sb.auth.signOut()
    window.location.reload()
  }

  // ── ESQUECEU SENHA ──
  async function esqueceuSenha() {
    const email = document.getElementById('login-email').value.trim()
    if (!email) { mostrarAlerta('⚠️ Digite seu e-mail no campo acima primeiro.', 'erro'); return }
    const { error } = await sb.auth.resetPasswordForEmail(email)
    if (error) { mostrarAlerta('❌ Erro ao enviar e-mail.', 'erro'); return }
    mostrarAlerta('✅ E-mail de recuperação enviado! Verifique sua caixa de entrada.', 'sucesso')
  }

  // ── MOSTRAR ÁREA DO LOGADO ──
  function mostrarAreaLogado(user) {
    document.getElementById('areaAuth').style.display = 'none'
    document.getElementById('areaLogado').style.display = 'block'
    document.getElementById('logadoEmail').textContent = user.email
    document.getElementById('btnVerPerfil').onclick = function() { window.location.href = 'perfil.html?id=' + user.id }
    sb.from('perfis').select('username').eq('id', user.id).single()
      .then(({ data }) => {
        document.getElementById('logadoNome').textContent =
          data?.username ? `Olá, ${data.username}! 👋` : 'Olá! 👋'
      })
  }

  // ── HELPERS ──
  function traduzirErro(msg) {
    if (msg.includes('Invalid login')) return 'E-mail ou senha incorretos.'
    if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail antes de entrar.'
    if (msg.includes('User already registered')) return 'Este e-mail já está cadastrado.'
    if (msg.includes('Password should be')) return 'Senha muito curta (mínimo 6 caracteres).'
    return msg
  }

  function trocarTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('ativo', (i===0&&tab==='entrar')||(i===1&&tab==='cadastrar'))
    })
    document.getElementById('painel-entrar').classList.toggle('ativo', tab==='entrar')
    document.getElementById('painel-cadastrar').classList.toggle('ativo', tab==='cadastrar')
    esconderAlerta()
  }

  function mostrarAlerta(msg, tipo='info') {
    const a = document.getElementById('alerta')
    a.textContent = msg
    a.className = `alerta visivel ${tipo}`
  }

  function esconderAlerta() {
    document.getElementById('alerta').classList.remove('visivel')
  }

  function verSenha(id, btn) {
    const inp = document.getElementById(id)
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈' }
    else { inp.type = 'password'; btn.textContent = '👁️' }
  }

  function verificarForca(senha) {
    const fill = document.getElementById('forcaFill')
    const texto = document.getElementById('forcaTexto')
    let forca = 0
    if (senha.length >= 6) forca++
    if (senha.length >= 10) forca++
    if (/[A-Z]/.test(senha)) forca++
    if (/[0-9]/.test(senha)) forca++
    if (/[^A-Za-z0-9]/.test(senha)) forca++
    const niveis = [
      {pct:'0%', cor:'transparent', txt:''},
      {pct:'25%', cor:'#ff4444', txt:'Fraca'},
      {pct:'50%', cor:'#ff8c00', txt:'Regular'},
      {pct:'75%', cor:'#f5e800', txt:'Boa'},
      {pct:'100%', cor:'#64ff96', txt:'Forte 💪'},
    ]
    const n = niveis[Math.min(forca, 4)]
    fill.style.width = n.pct
    fill.style.background = n.cor
    texto.textContent = n.txt
    texto.style.color = n.cor
  }

  function validarUsuario(inp) {
    inp.value = inp.value.replace(/[^a-z0-9_]/gi, '').toLowerCase()
  }

  function selecionarExibir(valor) {
    document.getElementById('cad-exibir').value = valor
    document.getElementById('opt-username').classList.toggle('ativo', valor === 'username')
    document.getElementById('opt-nome').classList.toggle('ativo', valor === 'nome')
  }
</script>

<script src="./header.js"></script>
</body>
</html>
